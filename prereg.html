<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Turn City — 사전예약 확인</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131f;
    --border: #1e1e30;
    --accent: #22d3ee;
    --accent2: #818cf8;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --success: #4ade80;
    --warn: #facc15;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(34,211,238,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(129,140,248,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .logo-sub {
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  /* 아바타 */
  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 16px;
  }
  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--border);
    object-fit: cover;
  }
  .avatar-badge {
    position: absolute;
    bottom: 2px; right: 2px;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .avatar-badge.registered { background: var(--success); }
  .avatar-badge.none       { background: var(--warn); }

  .username {
    font-size: 1.1rem;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .discord-tag {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 32px;
  }

  /* 상태 박스 */
  .status-box {
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid;
  }
  .status-box.registered {
    background: rgba(74,222,128,0.06);
    border-color: rgba(74,222,128,0.2);
  }
  .status-box.none {
    background: rgba(250,204,21,0.06);
    border-color: rgba(250,204,21,0.2);
  }
  .status-box.error {
    background: rgba(239,68,68,0.06);
    border-color: rgba(239,68,68,0.2);
  }

  .status-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .registered .status-label { color: var(--success); }
  .none .status-label       { color: var(--warn); }
  .error .status-label      { color: #f87171; }

  .code {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-family: monospace;
    margin-bottom: 8px;
  }
  .code-desc {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .claimed-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(74,222,128,0.12);
    border: 1px solid rgba(74,222,128,0.3);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 0.72rem;
    color: var(--success);
    margin-top: 12px;
  }

  /* 버튼 */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #5865f2;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 0.9rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s;
    width: 100%;
    justify-content: center;
  }
  .btn:hover { opacity: 0.85; }
  .btn svg { flex-shrink: 0; }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-top: 12px;
    font-size: 0.8rem;
    padding: 10px 20px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .info-text {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.7;
  }

  /* 로딩 */
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="logo">Turn City</div>
  <div class="logo-sub">사전예약 확인</div>
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:0.85rem">로딩 중...</p>
</div>

<script>
const params = new URLSearchParams(location.search);
const status   = params.get('status');
const username = params.get('username');
const avatar   = params.get('avatar');
const userId   = params.get('id');
const code     = params.get('code');
const number   = params.get('number');
const claimed  = params.get('claimed') === '1';
const error    = params.get('error');

const card = document.getElementById('card');

function avatarUrl(id, hash) {
  if (!hash) return `https://cdn.discordapp.com/embed/avatars/0.png`;
  return `https://cdn.discordapp.com/avatars/${id}/${hash}.png?size=128`;
}

function render() {
  const logoHtml = `
    <div class="logo">Turn City</div>
    <div class="logo-sub">사전예약 확인</div>
  `;

  // 에러
  if (error || (!status && !username)) {
    card.innerHTML = logoHtml + `
      <div class="status-box error fade-in">
        <div class="status-label">오류 발생</div>
        <div style="font-size:0.9rem;color:#f87171">로그인 중 문제가 발생했습니다.<br>다시 시도해주세요.</div>
      </div>
      <a class="btn" href="/prereg/login">
        <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="#fff"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
        디스코드로 다시 로그인
      </a>
    `;
    return;
  }

  // 로그인 전
  if (!status) {
    card.innerHTML = logoHtml + `
      <p class="info-text" style="margin-bottom:32px">디스코드 계정으로 로그인하면<br>사전예약 여부와 번호를 확인할 수 있습니다.</p>
      <a class="btn" href="/prereg/login">
        <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="#fff"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
        디스코드로 로그인
      </a>
      <div class="divider"></div>
      <p class="info-text">Turn City 사전예약은 디스코드 서버에서<br>사전예약 버튼을 눌러 신청할 수 있습니다.</p>
    `;
    return;
  }

  const avatarHtml = `
    <div class="avatar-wrap">
      <img class="avatar" src="${avatarUrl(userId, avatar)}" alt="" />
      <div class="avatar-badge ${status}">
        ${status === 'registered' ? '✓' : '!'}
      </div>
    </div>
    <div class="username">${escHtml(username)}</div>
  `;

  // 사전예약 완료
  if (status === 'registered') {
    card.innerHTML = logoHtml + avatarHtml + `
      <div class="status-box registered fade-in">
        <div class="status-label">✅ 사전예약 완료</div>
        <div class="code">${escHtml(code)}</div>
        <div class="code-desc">예약 번호 No. ${number}</div>
        ${claimed ? '<div class="claimed-badge">🎁 보상 수령 완료</div>' : ''}
      </div>
      <p class="info-text">오픈일에 서버 접속만 하면<br>보상이 자동으로 지급됩니다.</p>
      <div class="divider"></div>
      <a class="btn btn-logout" href="/prereg.html">로그아웃</a>
    `;
    return;
  }

  // 미신청
  card.innerHTML = logoHtml + avatarHtml + `
    <div class="status-box none fade-in">
      <div class="status-label">⚠️ 사전예약 미신청</div>
      <div style="font-size:0.9rem;color:var(--warn);margin-bottom:4px">아직 사전예약하지 않으셨어요.</div>
      <div class="code-desc">디스코드 서버에서 신청해주세요!</div>
    </div>
    <p class="info-text">Turn City 디스코드 서버의<br>사전예약 채널에서 신청할 수 있습니다.</p>
    <div class="divider"></div>
    <a class="btn btn-logout" href="/prereg.html">로그아웃</a>
  `;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

render();
</script>
</body>
</html>
