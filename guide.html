<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<meta name="theme-color" content="#FFA51F">
<meta property="og:type" content="website">
<meta property="og:site_name" content="TURN CITY">
<meta property="og:title" content="가이드 · TURN CITY">
<meta property="og:description" content="턴시티 규칙과 시스템 가이드. 처음 온 사람도 여기부터 읽으면 됩니다.">
<meta property="og:image" content="https://turn2026.com/og-image.jpg">
<meta property="og:image:width" content="1200">

<meta property="og:url" content="https://turn2026.com/guide.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="가이드 · TURN CITY">
<meta name="twitter:description" content="턴시티 규칙과 시스템 가이드.">
<meta name="twitter:image" content="https://turn2026.com/og-image.jpg">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="turn.css">
</head>
<body>

<header class="solid" id="hdr">
  <div class="wrap nav tc-nav">
    <a class="tc-logo" href="index.html">
      <span class="blink" aria-hidden="true"></span>
      <span class="wm">TURN <em>CITY</em></span>
    </a>
    <nav class="tc-links" id="navLinks">
      <a href="news.html">소식</a>
      <a href="guide.html" class="on">가이드</a>
      <a href="https://discord.gg/2026turn" target="_blank" rel="noopener">디스코드</a>
    </nav>
    <button class="tc-burger" id="burger" aria-label="메뉴 열기">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <a class="tc-join" href="https://cfx.re/join/xlzdevr" target="_blank" rel="noopener">서버 접속</a>
  </div>
</header>

<div class="wrap doc">
  <aside class="side">
    <div class="side-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="sideSearch" type="text" placeholder="가이드 검색">
      <span class="kbd">Ctrl K</span>
    </div>
    <ul class="tree" id="tree"></ul>
  </aside>

  <main class="content page-fade" id="content"></main>

  <nav class="toc" id="toc"></nav>
</div>

<footer data-auto></footer>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
TURN.ready(function(){

  document.getElementById("burger").addEventListener("click", () => {
    document.getElementById("navLinks").classList.toggle("open");
  });

  const groups = (window.TURN_DATA.guides.groups) || [];
  const flat = TURN.guideFlat();
  const params = new URLSearchParams(location.search);
  const pageId = params.get("page") || (flat[0] && flat[0].id);
  const current = TURN.guideById(pageId) || flat[0];

  // ---- 사이드바 ----
  const tree = document.getElementById("tree");
  const caret = '<svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6-6 6"/></svg>';
  tree.innerHTML = groups.map(g => `
    <li>
      <div class="grp">${g.title}</div>
      <ul style="list-style:none">
        ${g.items.map(it => it.items ? `
          <li>
            <div class="node ${it.items.some(c => c.id === pageId) ? '' : 'collapsed'}">${caret}${it.title}</div>
            <ul class="children">
              ${it.items.map(c => `<li><a href="guide.html?page=${c.id}"><div class="node ${c.id === pageId ? 'active' : ''}" style="padding-left:24px">${c.title}</div></a></li>`).join("")}
            </ul>
          </li>` : `
          <li><a href="guide.html?page=${it.id}"><div class="node ${it.id === pageId ? 'active' : ''}">${it.title}</div></a></li>`
        ).join("")}
      </ul>
    </li>`).join("");

  tree.querySelectorAll(".node").forEach(n => {
    if (n.querySelector(".caret")) n.addEventListener("click", () => n.classList.toggle("collapsed"));
  });

  const search = document.getElementById("sideSearch");
  search.addEventListener("input", e => {
    const q = e.target.value.trim().toLowerCase();
    tree.querySelectorAll(".children li, .grp + ul > li").forEach(li => {
      li.style.display = (!q || li.textContent.toLowerCase().includes(q)) ? "" : "none";
    });
  });
  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") { e.preventDefault(); search.focus(); }
  });

  // ---- 본문 ----
  const content = document.getElementById("content");
  if (!current) {
    content.innerHTML = `<h1>아직 가이드가 없습니다.</h1><p class="a-lead">문서가 올라오면 여기에 표시됩니다. 그동안 궁금한 건 디스코드에서 물어보세요.</p>`;
    return;
  }

  const idx = flat.findIndex(p => p.id === current.id);
  const prev = flat[idx - 1], next = flat[idx + 1];
  const crumbs = [current.group, current.parent, current.title].filter(Boolean);

  content.innerHTML = `
    <div class="crumbs">${crumbs.map((c, i) =>
      `<span class="${i === crumbs.length - 1 ? 'cur' : ''}">${c}</span>${i < crumbs.length - 1 ? '<span class="sep">/</span>' : ''}`
    ).join("")}</div>
    <h1>${current.title}</h1>
    ${TURN.renderBlocks(current.blocks)}
    <nav class="page-nav">
      ${prev ? `<a href="guide.html?page=${prev.id}">
        <div class="lbl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 6l-6 6 6 6"/></svg>이전 페이지</div>
        <div class="t">${prev.title}</div></a>` : "<span></span>"}
      ${next ? `<a class="next" href="guide.html?page=${next.id}">
        <div class="lbl">다음 페이지 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg></div>
        <div class="t">${next.title}</div></a>` : "<span></span>"}
    </nav>
    ${current.updated ? `<div class="updated">마지막 수정 ${current.updated}</div>` : ""}`;

  document.title = current.title + " · TURN CITY";
  TURN.bindBlocks(content);
  TURN.buildTOC(content, document.getElementById("toc"));

});
</script>
</body>
</html>
