<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURN CITY</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="logo" href="index.html"><span class="mark"></span><span class="name">TURN CITY</span></a>
    <nav class="nav-center">
      <a href="news.html">소식</a>
      <a href="guide.html">가이드</a>
      <a href="#">디스코드</a>
    </nav>
    <div class="nav-right"><a class="login" href="#">로그인</a><a class="btn-start" href="#">GAME START</a></div>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="top">
  <div class="hero-bg"></div>
  <div class="hero-content wrap">
    <h1 class="reveal in">당신의 인생을<br><span class="accent">턴시티</span>에서 함께하세요</h1>
    <p class="sub reveal in" data-d="1">지금 바로 시작하세요</p>
    <div class="hero-cta reveal in" data-d="2">
      <a class="pill solid" href="#">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4A19 19 0 0 0 15.6 3l-.3.5a17 17 0 0 1 4.2 1.3 15.6 15.6 0 0 0-13-.2 17 17 0 0 1 4.2-1.4L10.4 3A19 19 0 0 0 3.7 4.4C1.2 8.3.5 12.1.8 15.8A19 19 0 0 0 6.6 18l.6-1.1c-.6-.2-1.3-.5-1.9-.9l.5-.3a13.5 13.5 0 0 0 11.4 0l.5.3c-.6.4-1.3.7-1.9.9L17 18a19 19 0 0 0 5.8-2.2c.4-4.3-.7-8-3.5-11.4ZM9 13.6c-.9 0-1.7-.9-1.7-1.9S8 9.8 9 9.8s1.7.9 1.7 1.9-.8 1.9-1.7 1.9Zm6 0c-.9 0-1.7-.9-1.7-1.9S14 9.8 15 9.8s1.7.9 1.7 1.9-.8 1.9-1.7 1.9Z"/></svg>
        Discord 참여하기
      </a>
      <a class="pill ghost" href="guide.html">게임 가이드</a>
    </div>
  </div>
  <a class="scroll-ind" href="#news" aria-label="아래로"><span class="mouse"></span></a>
</section>

<!-- 최근 소식 (data.js 연동) -->
<section class="news-sec" id="news">
  <div class="wrap">
    <div class="sec-head reveal">
      <h2>최근 소식</h2>
      <a class="more" href="news.html">전체보기
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg>
      </a>
    </div>
    <div class="cards" id="homeNews"></div>
  </div>
</section>

<!-- CTA -->
<section class="cta">
  <div class="wrap">
    <h2 class="reveal">지금 바로 시작하세요</h2>
    <p class="reveal" data-d="1">턴시티 서버에 접속하고 새로운 인생을 시작하세요</p>
    <a class="pill solid reveal" data-d="2" href="#">서버 접속하기
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </div>
</section>

<footer data-auto></footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const CAT = { patch: "패치노트", notice: "공지사항" };
  const home = document.getElementById("homeNews");
  home.innerHTML = TURN.news().slice(0, 3).map((p, i) => `
    <a class="card reveal" data-d="${i + 1}" href="article.html?id=${p.id}">
      <div class="card-thumb"><span class="badge">${CAT[p.category] || "소식"}</span></div>
      <div class="card-body">
        <div class="card-meta"><span class="tag">${CAT[p.category] || "소식"}</span><span class="dot"></span><span>${p.date.replace(/-/g, ". ")}.</span></div>
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.summary}</div>
      </div>
    </a>`).join("");
  // 새로 삽입된 reveal 관찰
  const io = new IntersectionObserver((e) => e.forEach(x => { if (x.isIntersecting) { x.target.classList.add("in"); io.unobserve(x.target); } }), { threshold: .12 });
  home.querySelectorAll(".reveal").forEach(el => io.observe(el));
</script>
</body>
</html>
