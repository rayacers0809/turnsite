<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURN CITY</title>
<meta name="description" content="로스산토스 한국 FiveM 롤플레잉 서버. 새 이름, 새 직업, 두 번째 인생.">
<meta name="theme-color" content="#3B6FF5">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="turn.css">
</head>
<body>

<header class="tc-top">
  <div class="wrap tc-top-in">
    <a class="tc-brand" href="index.html">
      <span class="mk"></span>
      <span class="wm">TURN <i>CITY</i></span>
    </a>
    <nav class="tc-menu" id="menu">
      <a href="news.html">소식</a>
      <a href="guide.html">가이드</a>
      <a href="https://discord.gg/2026turn" target="_blank" rel="noopener">디스코드</a>
    </nav>
    <div class="tc-top-r">
      <span class="tc-status"><span class="lamp"></span>SERVER ONLINE</span>
      <button class="tc-burger" id="burger" aria-label="메뉴">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
      <a class="tc-enter" href="https://cfx.re/join/xlzdevr" target="_blank" rel="noopener">GAME START</a>
    </div>
  </div>
</header>

<!-- HERO : 배경 이미지 유지 / 내용은 좌하단 앵커 -->
<section class="tc-hero">
  <div class="tc-hero-bg"></div>
  <div class="tc-strip"><span>Los Santos · Since 2026</span></div>
  <div class="wrap">
    <div class="tc-eyebrow reveal in"><span class="lamp"></span>FIVEM ROLEPLAY · KR</div>
    <h1 class="reveal in" data-d="1">새 이름, 새 직업,<br><span class="b">두 번째 인생</span></h1>
    <p class="reveal in" data-d="2">턴시티에서는 아무도 당신의 과거를 묻지 않습니다.<br>경찰이든 정비공이든 뒷골목 상인이든, 오늘 누가 될지는 당신이 정합니다.</p>

    <div class="tc-acts reveal in" data-d="3">
      <a class="tc-b pri" href="https://discord.gg/2026turn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4A19 19 0 0 0 15.6 3l-.3.5a17 17 0 0 1 4.2 1.3 15.6 15.6 0 0 0-13-.2 17 17 0 0 1 4.2-1.4L10.4 3A19 19 0 0 0 3.7 4.4C1.2 8.3.5 12.1.8 15.8A19 19 0 0 0 6.6 18l.6-1.1c-.6-.2-1.3-.5-1.9-.9l.5-.3a13.5 13.5 0 0 0 11.4 0l.5.3c-.6.4-1.3.7-1.9.9L17 18a19 19 0 0 0 5.8-2.2c.4-4.3-.7-8-3.5-11.4ZM9 13.6c-.9 0-1.7-.9-1.7-1.9S8 9.8 9 9.8s1.7.9 1.7 1.9-.8 1.9-1.7 1.9Zm6 0c-.9 0-1.7-.9-1.7-1.9S14 9.8 15 9.8s1.7.9 1.7 1.9-.8 1.9-1.7 1.9Z"/></svg>
        디스코드 입장
      </a>
      <a class="tc-b sec" href="guide.html">처음이신가요?</a>
    </div>

    <dl class="tc-bar reveal in" data-d="4">
      <div><dt>FRAMEWORK</dt><dd>커스텀 vRP</dd></div>
      <div><dt>CONTENT</dt><dd>직업 · 경제 · 갱</dd></div>
      <div><dt>ENTRY</dt><dd>디스코드 심사제</dd></div>
    </dl>
  </div>
</section>

<!-- 최근 소식 : 가로 행 + 정사각 썸네일 -->
<section class="tc-sec">
  <div class="wrap">
    <div class="tc-head reveal">
      <h2><span class="kick">UPDATE LOG</span>최근 소식</h2>
      <a class="tc-all" href="news.html">전체 보기
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg>
      </a>
    </div>
    <div class="tc-feed" id="homeNews"></div>
  </div>
</section>

<footer data-auto></footer>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
TURN.ready(function(){

  const CAT = { patch: "패치노트", notice: "공지사항" };

  document.getElementById("burger").addEventListener("click", () => {
    document.getElementById("menu").classList.toggle("open");
  });

  const feed = document.getElementById("homeNews");
  feed.innerHTML = TURN.news().slice(0, 4).map((p, i) => `
    <a class="tc-item reveal" data-d="${(i % 3) + 1}" href="article.html?id=${p.id}">
      <span class="tc-shot"></span>
      <span>
        <span class="tc-it-m">
          <span class="tc-chip ${p.category}">${CAT[p.category] || "소식"}</span>
          <span class="tc-when">${p.date.replace(/-/g, ".")}</span>
        </span>
        <span class="tc-it-t">${p.title}</span>
        ${p.summary ? `<span class="tc-it-d">${p.summary}</span>` : ""}
      </span>
      <svg class="tc-go" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg>
    </a>`).join("");

  const io = new IntersectionObserver(e => e.forEach(x => {
    if (x.isIntersecting) { x.target.classList.add("in"); io.unobserve(x.target); }
  }), { threshold: .12 });
  document.querySelectorAll(".reveal:not(.in)").forEach(el => io.observe(el));

});
</script>
</body>
</html>
