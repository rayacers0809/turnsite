<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드민 · TURN CITY</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
<style>
  body{background:#0b0c0e}
  .admin-top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;padding:12px 20px;background:rgba(11,12,14,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .admin-top .brand{display:flex;align-items:center;gap:10px;font-weight:800}
  .admin-top .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--logo) center/cover no-repeat}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{background:transparent;border:none;color:var(--muted);font-family:inherit;font-weight:700;font-size:14px;padding:8px 18px;border-radius:8px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--accent);color:#fff}
  .admin-top .spacer{flex:1}
  .abtn{background:var(--card);border:1px solid var(--line);color:var(--text);font-family:inherit;font-weight:600;font-size:13.5px;padding:9px 16px;border-radius:9px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .abtn:hover{border-color:var(--line-2)}
  .abtn.primary{background:var(--pill);color:var(--pill-txt);border-color:var(--pill)}
  .abtn.primary:hover{box-shadow:0 8px 22px rgba(255,255,255,.15)}
  .abtn svg{width:15px;height:15px}
  .save-dot{font-size:12px;color:var(--muted-2)}

  .admin-body{display:grid;grid-template-columns:280px minmax(0,1fr) minmax(0,1fr);gap:0;height:calc(100vh - 60px)}
  .col{overflow-y:auto;padding:18px}
  .col.list{border-right:1px solid var(--line)}
  .col.editor{border-right:1px solid var(--line)}
  .col-title{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);margin-bottom:12px}

  .entry{display:block;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .entry:hover{border-color:var(--line-2)}
  .entry.sel{border-color:var(--accent);background:rgba(61,139,255,.08)}
  .entry .e-t{font-weight:700;font-size:14px}
  .entry .e-m{margin-top:4px;color:var(--muted-2);font-size:12px;display:flex;gap:8px}
  .glabel{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);margin:16px 0 6px 2px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;background:#0e0f12;border:1px solid var(--line);border-radius:9px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color .15s}
  .field textarea{resize:vertical;min-height:70px;line-height:1.5}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(61,139,255,.5)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .hintline{font-size:11.5px;color:var(--muted-2);margin-top:5px}

  .block-item{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .bi-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--line)}
  .bi-type{font-weight:800;font-size:12px;letter-spacing:.04em;color:var(--accent-2);text-transform:uppercase}
  .bi-head .spacer{flex:1}
  .icobtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:7px;width:28px;height:28px;display:grid;place-items:center;cursor:pointer;transition:.15s}
  .icobtn:hover{color:#fff;border-color:var(--line-2)}
  .icobtn.del:hover{color:#f43f5e;border-color:rgba(244,63,94,.4)}
  .icobtn svg{width:14px;height:14px}
  .bi-body{padding:12px}
  .add-block{position:relative;margin-top:6px}
  .add-block>button{width:100%;background:transparent;border:1.5px dashed var(--line-2);color:var(--muted);font-family:inherit;font-weight:700;font-size:13.5px;padding:12px;border-radius:11px;cursor:pointer;transition:.15s}
  .add-block>button:hover{color:#fff;border-color:var(--accent)}
  .type-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:8px;display:none;grid-template-columns:repeat(3,1fr);gap:6px;z-index:20;box-shadow:0 20px 50px rgba(0,0,0,.6)}
  .type-menu.open{display:grid}
  .type-menu button{background:var(--card);border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:12.5px;font-weight:600;padding:9px;border-radius:8px;cursor:pointer;transition:.15s}
  .type-menu button:hover{border-color:var(--accent);color:#fff}

  .preview-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .preview-box{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:26px}
  .empty-state{color:var(--muted-2);text-align:center;padding:80px 20px;font-size:14px}
  @media (max-width:1100px){.admin-body{grid-template-columns:240px 1fr}.col.preview{display:none}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:12px 22px;border-radius:999px;opacity:0;transition:.3s var(--ease);z-index:100;box-shadow:0 12px 30px rgba(61,139,255,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="admin-top">
  <div class="brand"><span class="mark"></span>TURN CITY 어드민</div>
  <div class="seg">
    <button id="tabNews" class="on" onclick="switchTab('news')">소식</button>
    <button id="tabGuide" onclick="switchTab('guide')">가이드</button>
  </div>
  <span class="save-dot" id="saveDot">저장됨</span>
  <div class="spacer"></div>
  <button class="abtn" onclick="loadOriginal()">원본 불러오기</button>
  <label class="abtn" style="cursor:pointer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3M7 8l5-5 5 5M5 21h14"/></svg>가져오기<input type="file" accept=".js,.json" style="display:none" onchange="importFile(event)"></label>
  <button class="abtn primary" onclick="exportData()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>data.js 내보내기</button>
</div>

<div class="admin-body">
  <!-- 목록 -->
  <div class="col list">
    <button class="abtn primary" style="width:100%;justify-content:center;margin-bottom:14px" onclick="createEntry()">+ 새로 만들기</button>
    <div class="col-title" id="listTitle">소식 목록</div>
    <div id="entryList"></div>
  </div>

  <!-- 에디터 -->
  <div class="col editor" id="editorCol">
    <div class="empty-state">왼쪽에서 항목을 선택하거나 새로 만드세요.</div>
  </div>

  <!-- 미리보기 -->
  <div class="col preview">
    <div class="preview-head"><div class="col-title" style="margin:0">미리보기</div></div>
    <div class="preview-box"><div class="blocks" id="preview"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
/* ============ 상태 ============ */
const LS = "turncity_admin_draft";
let state = load();
let tab = "news";       // news | guide
let selId = null;

function deepClone(o){return JSON.parse(JSON.stringify(o))}
function fromData(){ return { news: deepClone(window.TURN_DATA.news), guides: deepClone(window.TURN_DATA.guides) }; }
function load(){ try{ const d=localStorage.getItem(LS); if(d) return JSON.parse(d);}catch(e){} return fromData(); }
function persist(){ try{ localStorage.setItem(LS, JSON.stringify(state)); saveDot.textContent="자동저장됨 · "+new Date().toLocaleTimeString(); }catch(e){} }
function loadOriginal(){ if(confirm("현재 편집 내용을 버리고 data.js 원본을 불러올까요?")){ state=fromData(); localStorage.removeItem(LS); selId=null; renderAll(); toast("원본 불러옴"); } }

/* 가이드: 내부적으로 flat 배열로 다룸 */
function guideFlat(){
  const out=[];
  (state.guides.groups||[]).forEach(g=>(g.items||[]).forEach(it=>{
    if(it.items) it.items.forEach(c=>out.push({...c, group:g.title, parent:it.title}));
    else out.push({...it, group:g.title, parent:null});
  }));
  return out;
}
/* flat 배열 -> groups 구조 재조립 */
function rebuildGuides(flat){
  const groups=[];
  const gmap={};
  flat.forEach(p=>{
    let g=gmap[p.group]; if(!g){ g={title:p.group, items:[], _pmap:{}}; gmap[p.group]=g; groups.push(g); }
    const page={id:p.id,title:p.title,updated:p.updated,blocks:p.blocks};
    if(p.parent){ let par=g._pmap[p.parent]; if(!par){ par={title:p.parent, items:[]}; g._pmap[p.parent]=par; g.items.push(par);} par.items.push(page); }
    else g.items.push(page);
  });
  groups.forEach(g=>delete g._pmap);
  return {groups};
}

/* ============ 렌더 ============ */
function switchTab(t){ tab=t; selId=null; tabNews.classList.toggle("on",t==="news"); tabGuide.classList.toggle("on",t==="guide");
  listTitle.textContent = t==="news"?"소식 목록":"가이드 목록"; renderAll(); }

function renderAll(){ renderList(); renderEditor(); }

function renderList(){
  const el=document.getElementById("entryList");
  if(tab==="news"){
    const list=(state.news||[]).slice().sort((a,b)=>a.date<b.date?1:-1);
    el.innerHTML=list.map(p=>`<div class="entry ${p.id===selId?'sel':''}" onclick="select('${p.id}')">
      <div class="e-t">${esc(p.title)}</div>
      <div class="e-m"><span>${p.category==='patch'?'패치노트':'공지사항'}</span><span>·</span><span>${p.date}</span></div>
    </div>`).join("") || `<div class="hintline">항목이 없습니다.</div>`;
  } else {
    const flat=guideFlat(); let html=""; let lastGrp=null;
    flat.forEach(p=>{ if(p.group!==lastGrp){ html+=`<div class="glabel">${esc(p.group)}</div>`; lastGrp=p.group; }
      html+=`<div class="entry ${p.id===selId?'sel':''}" onclick="select('${p.id}')">
        <div class="e-t">${esc(p.title)}</div>
        <div class="e-m">${p.parent?`<span>${esc(p.parent)}</span>`:'<span>—</span>'}</div></div>`; });
    el.innerHTML=html || `<div class="hintline">항목이 없습니다.</div>`;
  }
}

function currentEntry(){
  if(tab==="news") return (state.news||[]).find(p=>p.id===selId);
  return guideFlat().find(p=>p.id===selId);
}
function select(id){ selId=id; renderAll(); }

function renderEditor(){
  const col=document.getElementById("editorCol");
  const e=currentEntry();
  if(!e){ col.innerHTML=`<div class="empty-state">왼쪽에서 항목을 선택하거나 새로 만드세요.</div>`; document.getElementById("preview").innerHTML=""; return; }

  let meta="";
  if(tab==="news"){
    meta=`
      <div class="field"><label>제목</label><input value="${esc(e.title)}" oninput="setMeta('title',this.value)"></div>
      <div class="row2">
        <div class="field"><label>카테고리</label><select onchange="setMeta('category',this.value)">
          <option value="patch" ${e.category==='patch'?'selected':''}>패치노트</option>
          <option value="notice" ${e.category==='notice'?'selected':''}>공지사항</option></select></div>
        <div class="field"><label>날짜</label><input type="date" value="${e.date}" oninput="setMeta('date',this.value)"></div>
      </div>
      <div class="field"><label>요약 (목록/카드에 표시)</label><textarea oninput="setMeta('summary',this.value)">${esc(e.summary||"")}</textarea></div>
      <div class="field"><label>ID (URL, 영문/숫자)</label><input value="${esc(e.id)}" oninput="setMeta('id',this.value)"><div class="hintline">변경 시 링크가 바뀝니다.</div></div>`;
  } else {
    meta=`
      <div class="field"><label>제목</label><input value="${esc(e.title)}" oninput="setMeta('title',this.value)"></div>
      <div class="row2">
        <div class="field"><label>그룹 (사이드바 상단)</label><input value="${esc(e.group||'가이드')}" oninput="setMeta('group',this.value)"></div>
        <div class="field"><label>하위그룹 (선택)</label><input value="${esc(e.parent||'')}" placeholder="예: 결제등급안내" oninput="setMeta('parent',this.value)"></div>
      </div>
      <div class="row2">
        <div class="field"><label>ID (URL)</label><input value="${esc(e.id)}" oninput="setMeta('id',this.value)"></div>
        <div class="field"><label>마지막 업데이트</label><input value="${esc(e.updated||'')}" placeholder="2026년 7월 6일" oninput="setMeta('updated',this.value)"></div>
      </div>`;
  }

  col.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="col-title" style="margin:0">${tab==='news'?'소식':'가이드'} 편집</div>
      <button class="abtn" style="color:#f43f5e" onclick="deleteEntry()">삭제</button>
    </div>
    ${meta}
    <div class="glabel">본문 블록</div>
    <div id="blockList"></div>
    <div class="add-block">
      <button onclick="toggleTypeMenu(event)">+ 블록 추가</button>
      <div class="type-menu" id="typeMenu">
        ${BLOCK_ORDER.map(t=>`<button onclick="addBlock('${t}')">${BLOCK_LABEL[t]}</button>`).join("")}
      </div>
    </div>`;
  renderBlocks();
  updatePreview();
}

/* ---- 메타 편집 ---- */
function setMeta(k,v){
  const e=currentEntry(); if(!e) return;
  if(tab==="news"){ e[k]=v; if(k==="id") selId=v; }
  else{
    // guide: flat 편집 후 재조립
    let flat=guideFlat(); const idx=flat.findIndex(p=>p.id===selId);
    const oldId=selId; flat[idx][k]=v;
    if(k==="id") selId=v;
    state.guides=rebuildGuides(flat);
  }
  persist();
  if(k==="title"||k==="date"||k==="category"||k==="id"||k==="group"||k==="parent") renderList();
  if(k==="id"){} // selId already updated for guide; for news links use id directly
  updatePreview();
}

/* ============ 블록 에디터 ============ */
const BLOCK_ORDER=["heading","paragraph","hint","list","code","table","tabs","expandable","cards","tier","quote","image","embed","steps","divider"];
const BLOCK_LABEL={heading:"제목",paragraph:"문단",hint:"힌트박스",list:"리스트",code:"코드",table:"표",tabs:"탭",expandable:"토글",cards:"카드",tier:"등급표",quote:"인용",image:"이미지",embed:"임베드",steps:"단계",divider:"구분선"};
function defBlock(t){
  switch(t){
    case "heading": return {type:"heading",level:2,text:"제목"};
    case "paragraph": return {type:"paragraph",text:"내용을 입력하세요. **굵게**, *기울임*, `코드`, [링크](url) 지원."};
    case "hint": return {type:"hint",style:"info",text:"참고할 내용을 적어주세요."};
    case "list": return {type:"list",style:"unordered",items:["항목 1","항목 2"]};
    case "code": return {type:"code",title:"example.lua",lang:"lua",code:"print('hello')"};
    case "table": return {type:"table",headers:["항목","값"],rows:[["A","1"],["B","2"]]};
    case "tabs": return {type:"tabs",tabs:[{label:"탭1",content:"내용1"},{label:"탭2",content:"내용2"}]};
    case "expandable": return {type:"expandable",title:"질문",content:"답변"};
    case "cards": return {type:"cards",cards:[{icon:"🎮",title:"카드",desc:"설명",href:"#"}]};
    case "tier": return {type:"tier",name:"VIP",color:"#3d8bff",sub:"누적 5만원",benefits:["혜택 1","혜택 2"]};
    case "quote": return {type:"quote",text:"인용문"};
    case "image": return {type:"image",src:"",caption:""};
    case "embed": return {type:"embed",url:""};
    case "steps": return {type:"steps",items:[{title:"1단계",desc:"설명"}]};
    case "divider": return {type:"divider"};
  }
}
function blocksArr(){ const e=currentEntry(); if(!e) return []; if(!e.blocks) e.blocks=[]; return e.blocks; }
function commitGuideBlocks(){ if(tab==="guide"){ const flat=guideFlat(); state.guides=rebuildGuides(flat); } }

function renderBlocks(){
  const wrap=document.getElementById("blockList"); if(!wrap) return;
  const bs=blocksArr();
  wrap.innerHTML=bs.map((b,i)=>`
    <div class="block-item">
      <div class="bi-head">
        <span class="bi-type">${BLOCK_LABEL[b.type]||b.type}</span><span class="spacer"></span>
        <button class="icobtn" onclick="moveBlock(${i},-1)" title="위로">▲</button>
        <button class="icobtn" onclick="moveBlock(${i},1)" title="아래로">▼</button>
        <button class="icobtn del" onclick="removeBlock(${i})" title="삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg></button>
      </div>
      <div class="bi-body">${blockFields(b,i)}</div>
    </div>`).join("");
}
function blockFields(b,i){
  const F=(label,val,field,ph="")=>`<div class="field"><label>${label}</label><input value="${esc(val||"")}" placeholder="${ph}" oninput="setBlock(${i},'${field}',this.value)"></div>`;
  const TA=(label,val,field,ph="")=>`<div class="field"><label>${label}</label><textarea placeholder="${ph}" oninput="setBlock(${i},'${field}',this.value)">${esc(val||"")}</textarea></div>`;
  switch(b.type){
    case "heading": return `<div class="row2">
      <div class="field"><label>레벨</label><select onchange="setBlock(${i},'level',+this.value)"><option value="2" ${b.level!=3?'selected':''}>H2</option><option value="3" ${b.level==3?'selected':''}>H3</option></select></div>
      <div class="field"><label>텍스트</label><input value="${esc(b.text)}" oninput="setBlock(${i},'text',this.value)"></div></div>`;
    case "paragraph": return TA("문단",b.text,"text");
    case "quote": return TA("인용문",b.text,"text");
    case "hint": return `<div class="field"><label>종류</label><select onchange="setBlock(${i},'style',this.value)">
        ${["info","success","warning","danger"].map(s=>`<option value="${s}" ${b.style===s?'selected':''}>${s}</option>`).join("")}</select></div>`+TA("내용",b.text,"text");
    case "code": return `<div class="row2">${F("제목",b.title,"title","server.cfg")}${F("언어",b.lang,"lang","lua")}</div>`+TA("코드",b.code,"code");
    case "image": return F("이미지 URL",b.src,"src","https://...")+F("캡션",b.caption,"caption");
    case "embed": return F("URL (YouTube 등)",b.url,"url","https://youtu.be/...");
    case "expandable": return F("제목",b.title,"title")+TA("내용",b.content,"content");
    case "list": return `<div class="field"><label>스타일</label><select onchange="setBlock(${i},'style',this.value)">
        <option value="unordered" ${b.style==='unordered'?'selected':''}>• 불릿</option>
        <option value="ordered" ${b.style==='ordered'?'selected':''}>1. 번호</option>
        <option value="task" ${b.style==='task'?'selected':''}>☑ 체크</option></select></div>`+
        TA("항목 (한 줄에 하나"+(b.style==='task'?", 완료는 앞에 [x]":"")+")", listToText(b),"__list","항목1\n항목2")+
        `<div class="hintline">체크리스트: 완료 항목 앞에 <code class="ic">[x]</code></div>`;
    case "table": return F("헤더 (| 로 구분)",(b.headers||[]).join(" | "),"__theaders","항목 | 값")+
        TA("행 (한 줄=한 행, | 로 셀 구분)",(b.rows||[]).map(r=>r.join(" | ")).join("\n"),"__trows","A | 1\nB | 2");
    case "tabs": return TA("탭 (한 줄=한 탭, 라벨 :: 내용)",(b.tabs||[]).map(t=>`${t.label} :: ${t.content}`).join("\n"),"__tabs","Windows :: 설명\nMac :: 설명");
    case "cards": return TA("카드 (한 줄=한 카드, 아이콘 :: 제목 :: 설명 :: 링크)",(b.cards||[]).map(c=>`${c.icon||""} :: ${c.title||""} :: ${c.desc||""} :: ${c.href||"#"}`).join("\n"),"__cards","🎮 :: 시작 :: 지금 접속 :: #");
    case "steps": return TA("단계 (한 줄=한 단계, 제목 :: 설명)",(b.items||[]).map(s=>`${s.title} :: ${s.desc||""}`).join("\n"),"__steps","설치 :: FiveM 설치\n접속 :: 서버 연결");
    case "tier": return `<div class="row2">${F("등급명",b.name,"name")}<div class="field"><label>색상</label><input type="color" value="${b.color||'#3d8bff'}" oninput="setBlock(${i},'color',this.value)"></div></div>`+
        F("서브 (누적 금액 등)",b.sub,"sub","누적 5만원")+
        TA("혜택 (한 줄에 하나)",(b.benefits||[]).join("\n"),"__benefits");
    case "divider": return `<div class="hintline">구분선 (설정 없음)</div>`;
  }
  return "";
}
/* list 직렬화 */
function listToText(b){ if(b.style==="task") return (b.items||[]).map(i=>(i.done?"[x] ":"")+ (i.text||"")).join("\n"); return (b.items||[]).map(i=>typeof i==="string"?i:i.text).join("\n"); }

function setBlock(i,field,val){
  const bs=blocksArr(); const b=bs[i]; if(!b) return;
  if(field==="__list"){ const lines=val.split("\n").filter(x=>x.trim()!==""); 
    b.items = b.style==="task" ? lines.map(l=>{const m=l.match(/^\[x\]\s*/i); return {text:l.replace(/^\[x\]\s*/i,"").replace(/^\[ \]\s*/,""),done:!!m};}) : lines; }
  else if(field==="__theaders"){ b.headers=val.split("|").map(s=>s.trim()); }
  else if(field==="__trows"){ b.rows=val.split("\n").filter(x=>x.trim()!=="").map(r=>r.split("|").map(s=>s.trim())); }
  else if(field==="__tabs"){ b.tabs=val.split("\n").filter(x=>x.trim()!=="").map(l=>{const [label,...rest]=l.split("::"); return {label:(label||"").trim(),content:rest.join("::").trim()};}); }
  else if(field==="__cards"){ b.cards=val.split("\n").filter(x=>x.trim()!=="").map(l=>{const p=l.split("::").map(s=>s.trim()); return {icon:p[0]||"",title:p[1]||"",desc:p[2]||"",href:p[3]||"#"};}); }
  else if(field==="__steps"){ b.items=val.split("\n").filter(x=>x.trim()!=="").map(l=>{const p=l.split("::"); return {title:(p[0]||"").trim(),desc:(p.slice(1).join("::")||"").trim()};}); }
  else if(field==="__benefits"){ b.benefits=val.split("\n").filter(x=>x.trim()!==""); }
  else { b[field]=val; if(field==="style"){ renderBlocks(); } }
  commitGuideBlocks(); persist(); updatePreview();
}
function addBlock(t){ blocksArr().push(defBlock(t)); document.getElementById("typeMenu").classList.remove("open"); commitGuideBlocks(); persist(); renderBlocks(); updatePreview(); }
function removeBlock(i){ blocksArr().splice(i,1); commitGuideBlocks(); persist(); renderBlocks(); updatePreview(); }
function moveBlock(i,d){ const bs=blocksArr(); const j=i+d; if(j<0||j>=bs.length) return; [bs[i],bs[j]]=[bs[j],bs[i]]; commitGuideBlocks(); persist(); renderBlocks(); updatePreview(); }
function toggleTypeMenu(e){ e.stopPropagation(); document.getElementById("typeMenu").classList.toggle("open"); }
document.addEventListener("click",()=>document.getElementById("typeMenu")?.classList.remove("open"));

/* ============ 미리보기 ============ */
function updatePreview(){
  const e=currentEntry(); const p=document.getElementById("preview"); if(!p) return;
  if(!e){ p.innerHTML=""; return; }
  p.innerHTML=(tab==="news"?`<div class="a-meta" style="display:flex;gap:10px;color:var(--muted-2);font-size:13px;margin-bottom:10px"><span class="badge-inline">${e.category==='patch'?'패치노트':'공지사항'}</span><span>${e.date}</span></div>`:"")
    +`<h1 style="font-size:26px;font-weight:800;margin-bottom:16px">${esc(e.title)}</h1>`
    +(e.summary?`<p style="color:var(--muted);margin-bottom:20px">${esc(e.summary)}</p>`:"")
    + TURN.renderBlocks(e.blocks);
  TURN.bindBlocks(p);
}

/* ============ 생성/삭제 ============ */
function createEntry(){
  const rid = Date.now().toString(36);
  if(tab==="news"){
    const today=new Date().toISOString().slice(0,10);
    const n={id:"post-"+rid,category:"patch",title:"새 소식",date:today,summary:"",blocks:[{type:"paragraph",text:"내용을 입력하세요."}]};
    state.news.unshift(n); selId=n.id;
  }else{
    const flat=guideFlat();
    flat.push({id:"page-"+rid,title:"새 문서",group:"가이드",parent:null,updated:"",blocks:[{type:"paragraph",text:"내용을 입력하세요."}]});
    state.guides=rebuildGuides(flat); selId="page-"+rid;
  }
  persist(); renderAll(); toast("생성됨");
}
function deleteEntry(){
  if(!confirm("이 항목을 삭제할까요?")) return;
  if(tab==="news"){ state.news=state.news.filter(p=>p.id!==selId); }
  else{ const flat=guideFlat().filter(p=>p.id!==selId); state.guides=rebuildGuides(flat); }
  selId=null; persist(); renderAll(); toast("삭제됨");
}

/* ============ 내보내기 / 가져오기 ============ */
function exportData(){
  const out="/* TURN CITY 콘텐츠 데이터 — admin.html 에서 생성 */\nwindow.TURN_DATA = "+JSON.stringify({news:state.news,guides:state.guides},null,2)+";\n";
  const blob=new Blob([out],{type:"application/javascript"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="data.js"; a.click(); URL.revokeObjectURL(a.href);
  toast("data.js 내보냄 — 호스트에 업로드하세요");
}
function importFile(ev){
  const file=ev.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    let txt=r.result.trim();
    const m=txt.match(/window\.TURN_DATA\s*=\s*([\s\S]*?);?\s*$/);
    const json=m?m[1]:txt;
    const data=JSON.parse(json);
    state={news:data.news||[],guides:data.guides||{groups:[]}};
    selId=null; persist(); renderAll(); toast("가져오기 완료");
  }catch(e){ alert("파일을 읽을 수 없습니다: "+e.message); } };
  r.readAsText(file); ev.target.value="";
}

/* ============ 기타 ============ */
function esc(s=""){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
let toastTimer; function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200); }

renderAll();
</script>
