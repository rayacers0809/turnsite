<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드민 · TURN CITY</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
<style>
  body{background:#0b0c0e}
  .admin-top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;padding:12px 20px;background:rgba(11,12,14,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .admin-top .brand{display:flex;align-items:center;gap:10px;font-weight:800}
  .admin-top .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--logo) center/cover no-repeat}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{background:transparent;border:none;color:var(--muted);font-family:inherit;font-weight:700;font-size:14px;padding:8px 18px;border-radius:8px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--accent);color:#fff}
  .admin-top .spacer{flex:1}
  .abtn{background:var(--card);border:1px solid var(--line);color:var(--text);font-family:inherit;font-weight:600;font-size:13.5px;padding:9px 16px;border-radius:9px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .abtn:hover{border-color:var(--line-2)}
  .abtn.primary{background:var(--pill);color:var(--pill-txt);border-color:var(--pill)}
  .abtn.primary:hover{box-shadow:0 8px 22px rgba(255,255,255,.15)}
  .abtn svg{width:15px;height:15px}
  .save-dot{font-size:12px;color:var(--muted-2)}

.admin-body{display:grid;grid-template-columns:280px minmax(0,1fr) minmax(0,1fr);gap:0;height:calc(100vh - 60px)}
.col{overflow-y:auto;padding:18px}
.col.list{border-right:1px solid var(–line)}
.col.editor{border-right:1px solid var(–line)}
.col-title{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(–muted-2);margin-bottom:12px}

.entry{display:block;background:var(–card);border:1px solid var(–line);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.entry:hover{border-color:var(–line-2)}
.entry.sel{border-color:var(–accent);background:rgba(61,139,255,.08)}
.entry.drag{display:flex;align-items:center;gap:10px}
.entry.drag .grip{flex:0 0 16px;color:var(–muted-2);cursor:grab;display:grid;place-items:center;opacity:.6;transition:.15s}
.entry.drag:hover .grip{opacity:1;color:var(–muted)}
.entry.drag .grip svg{width:16px;height:16px}
.entry.drag .e-main{flex:1;min-width:0}
.entry.dragging{opacity:.4;border-color:var(–accent);border-style:dashed}
.entry.drop-hint{box-shadow:0 -2px 0 var(–accent)}
.glabel.drag-grp{display:flex;align-items:center;gap:6px;cursor:grab;border-radius:6px;padding:4px 2px}
.glabel.drag-grp .grip-sm{color:var(–muted-2);opacity:.5;display:grid;place-items:center}
.glabel.drag-grp .grip-sm svg{width:13px;height:13px}
.glabel.drag-grp:hover{opacity:1;background:rgba(255,255,255,.03)}
.glabel.drag-grp:hover .grip-sm{opacity:1}
.glabel.dragging{opacity:.4;background:rgba(61,139,255,.1)}
.col.list.drag-page .glabel{opacity:.4}
.entry .e-t{font-weight:700;font-size:14px}
.entry .e-m{margin-top:4px;color:var(–muted-2);font-size:12px;display:flex;gap:8px}
.glabel{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(–muted-2);margin:16px 0 6px 2px}

.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(–muted);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;background:#0e0f12;border:1px solid var(–line);border-radius:9px;color:var(–text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color .15s}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(61,139,255,.5)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hintline{font-size:11.5px;color:var(–muted-2);margin-top:5px}

.block-item{background:var(–card);border:1px solid var(–line);border-radius:12px;margin-bottom:12px;overflow:hidden}
.bi-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,255,255,.02);border-bottom:1px solid var(–line)}
.bi-type{font-weight:800;font-size:12px;letter-spacing:.04em;color:var(–accent-2);text-transform:uppercase}
.bi-head .spacer{flex:1}
.icobtn{background:transparent;border:1px solid var(–line);color:var(–muted);border-radius:7px;width:28px;height:28px;display:grid;place-items:center;cursor:pointer;transition:.15s}
.icobtn:hover{color:#fff;border-color:var(–line-2)}
.icobtn.del:hover{color:#f43f5e;border-color:rgba(244,63,94,.4)}
.icobtn svg{width:14px;height:14px}
.bi-body{padding:12px}
.add-block{position:relative;margin-top:6px}
.add-block>button{width:100%;background:transparent;border:1.5px dashed var(–line-2);color:var(–muted);font-family:inherit;font-weight:700;font-size:13.5px;padding:12px;border-radius:11px;cursor:pointer;transition:.15s}
.add-block>button:hover{color:#fff;border-color:var(–accent)}
.type-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(–card-2);border:1px solid var(–line);border-radius:12px;padding:8px;display:none;grid-template-columns:repeat(3,1fr);gap:6px;z-index:20;box-shadow:0 20px 50px rgba(0,0,0,.6)}
.type-menu.open{display:grid}
.type-menu button{background:var(–card);border:1px solid var(–line);color:var(–text);font-family:inherit;font-size:12.5px;font-weight:600;padding:9px;border-radius:8px;cursor:pointer;transition:.15s}
.type-menu button:hover{border-color:var(–accent);color:#fff}

.preview-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.preview-box{background:var(–bg);border:1px solid var(–line);border-radius:14px;padding:26px}
.empty-state{color:var(–muted-2);text-align:center;padding:80px 20px;font-size:14px}
@media (max-width:1100px){.admin-body{grid-template-columns:240px 1fr}.col.preview{display:none}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(–accent);color:#fff;font-weight:700;font-size:14px;padding:12px 22px;border-radius:999px;opacity:0;transition:.3s var(–ease);z-index:100;box-shadow:0 12px 30px rgba(61,139,255,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* login gate */
.gate{position:fixed;inset:0;z-index:200;background:#0a0b0d;display:grid;place-items:center}
.gate.hide{display:none}
.gate-box{width:340px;max-width:90vw;background:var(–card);border:1px solid var(–line);border-radius:16px;padding:30px 28px;text-align:center}
.gate-box .mark{width:52px;height:52px;border-radius:13px;background:var(–logo) center/cover no-repeat;margin:0 auto 16px;box-shadow:0 8px 24px rgba(61,139,255,.35)}
.gate-box h2{font-size:18px;font-weight:800;margin-bottom:6px}
.gate-box p{color:var(–muted-2);font-size:13px;margin-bottom:20px}
.gate-box input{width:100%;background:#0e0f12;border:1px solid var(–line);border-radius:10px;color:var(–text);font-family:inherit;font-size:15px;padding:12px 14px;outline:none;text-align:center;margin-bottom:12px}
.gate-box input:focus{border-color:var(–accent)}
.gate-box button{width:100%;background:var(–accent);color:#fff;border:none;font-family:inherit;font-weight:800;font-size:15px;padding:12px;border-radius:10px;cursor:pointer;transition:.15s}
.gate-box button:hover{filter:brightness(1.08)}
.gate-err{color:#f43f5e;font-size:13px;margin-top:10px;min-height:16px}
/* import modal */
.modal-ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;place-items:center;padding:20px}
.modal-ov.open{display:grid}
.modal{width:680px;max-width:96vw;max-height:90vh;overflow:auto;background:var(–card-2);border:1px solid var(–line);border-radius:16px;padding:22px}
.modal h3{font-size:16px;font-weight:800;margin-bottom:4px}
.modal .sub{color:var(–muted-2);font-size:12.5px;margin-bottom:16px;line-height:1.6}
.modal textarea{width:100%;min-height:240px;background:#0e0f12;border:1px solid var(–line);border-radius:10px;color:var(–text);font-family:ui-monospace,monospace;font-size:13px;padding:12px;outline:none;line-height:1.55;resize:vertical}
.modal textarea:focus{border-color:rgba(61,139,255,.5)}
.modal-f{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
</style>

</head>
<body>

<!-- 로그인 잠금 -->

<div class="gate" id="gate">
  <div class="gate-box">
    <div class="mark"></div>
    <h2>TURN CITY 어드민</h2>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="gatePw" placeholder="비밀번호">
    <button onclick="tryLogin()">로그인</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div class="admin-top">
  <div class="brand"><span class="mark"></span>TURN CITY 어드민</div>
  <div class="seg">
    <button id="tabNews" class="on" onclick="switchTab('news')">소식</button>
    <button id="tabGuide" onclick="switchTab('guide')">가이드</button>
  </div>
  <span class="save-dot" id="saveDot">저장됨</span>
  <div class="spacer"></div>
  <button class="abtn" onclick="changePw()">비번변경</button>
  <button class="abtn" onclick="logout()">로그아웃</button>
  <button class="abtn" onclick="serverConfig()">서버 설정</button>
  <button class="abtn" onclick="serverLoad()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3M7 8l5-5 5 5M5 21h14" transform="rotate(180 12 12)"/></svg>서버 불러오기</button>
  <button class="abtn primary" onclick="serverSave()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3h11l3 3v15H5zM8 3v6h7V3M8 15h8"/></svg>서버 저장</button>
  <label class="abtn" style="cursor:pointer" title="파일에서 가져오기(data.js)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3M7 8l5-5 5 5M5 21h14"/></svg><input type="file" accept=".js,.json" style="display:none" onchange="importFile(event)"></label>
  <button class="abtn" onclick="exportData()" title="data.js 백업 내보내기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg></button>
</div>

<div class="admin-body">
  <!-- 목록 -->
  <div class="col list">
    <button class="abtn primary" style="width:100%;justify-content:center;margin-bottom:8px" onclick="createEntry()">+ 새로 만들기</button>
    <button class="abtn" style="width:100%;justify-content:center;margin-bottom:14px" onclick="openImport()">↓ Markdown / GitBook 가져오기</button>
    <div class="col-title" id="listTitle">소식 목록</div>
    <div id="entryList"></div>
  </div>

  <!-- 에디터 -->

  <div class="col editor" id="editorCol">
    <div class="empty-state">왼쪽에서 항목을 선택하거나 새로 만드세요.</div>
  </div>

  <!-- 미리보기 -->

  <div class="col preview">
    <div class="preview-head"><div class="col-title" style="margin:0">미리보기</div></div>
    <div class="preview-box"><div class="blocks" id="preview"></div></div>
  </div>
</div>

<div class="modal-ov" id="mdModal">
  <div class="modal">
    <h3>Markdown / GitBook 가져오기</h3>
    <div class="sub">GitBook에서 복사한 마크다운을 붙여넣으면 블록으로 변환됩니다.<br>지원: 제목 · 문단 · 힌트박스 · 코드 · 표 · 탭 · 토글(expand/details) · 리스트 · 체크리스트 · 인용 · 이미지 · 임베드 · 구분선</div>
    <div class="row2">
      <div class="field"><label>제목 (비우면 첫 # 제목 사용)</label><input id="impTitle" placeholder="문서 제목"></div>
      <div class="field"><label>가져올 위치</label><select id="impTarget"><option value="guide">가이드</option><option value="news">소식</option></select></div>
    </div>
    <div class="field"><label>마크다운</label><textarea id="impText" placeholder="# 페이지 제목

{% hint style="info" %}
참고 내용
{% endhint %}

## 소제목

- 항목 1
- 항목 2”></textarea></div>
  
    <div class="modal-f"><button class="abtn" onclick="closeImport()">취소</button><button class="abtn primary" onclick="doImport()">가져오기</button></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>

<script src="data.js"></script>

<script src="app.js"></script>

<script>
/* ============ 로그인 잠금 (클라이언트 게이트) ============ */
/* 기본 비밀번호: turncity2026  — 로그인 후 '비번변경'으로 바꾸세요.
   다른 기기에서도 쓰려면 아래 DEFAULT_HASH 값을 새 해시로 교체 후 재배포하세요. */
const PW_KEY="turncity_admin_pwhash";
const DEFAULT_HASH="c0d7ae9ffa67f17fc51ba391d7defdb69b02bd4d28e93236e39371c92ef1959d";
function sha256(ascii){
  function rr(n,x){return (x>>>n)|(x<<(32-n));}
  var p=Math.pow,H=[],K=[],i,primeCounter=0,isC={};
  for(var cand=2;primeCounter<64;cand++){ if(!isC[cand]){ for(i=0;i<313;i+=cand) isC[i]=cand; H[primeCounter]=(p(cand,.5)*4294967296)|0; K[primeCounter++]=(p(cand,1/3)*4294967296)|0; } }
  var msg=[]; ascii=unescape(encodeURIComponent(ascii));
  for(i=0;i<ascii.length;i++) msg.push(ascii.charCodeAt(i));
  var l=msg.length*8; msg.push(0x80); while(msg.length%64-56) msg.push(0);
  for(i=0;i<8;i++) msg.push((l/p(2,(7-i)*8))&255);
  var h=H.slice(0);
  for(i=0;i<msg.length;i+=64){
    var w=[],j; for(j=0;j<16;j++) w[j]=(msg[i+j*4]<<24)|(msg[i+j*4+1]<<16)|(msg[i+j*4+2]<<8)|(msg[i+j*4+3]);
    for(j=16;j<64;j++){ var s0=rr(7,w[j-15])^rr(18,w[j-15])^(w[j-15]>>>3), s1=rr(17,w[j-2])^rr(19,w[j-2])^(w[j-2]>>>10); w[j]=(w[j-16]+s0+w[j-7]+s1)|0; }
    var a=h[0],b=h[1],c=h[2],d=h[3],e=h[4],f=h[5],g=h[6],hv=h[7];
    for(j=0;j<64;j++){ var S1=rr(6,e)^rr(11,e)^rr(25,e), ch=(e&f)^(~e&g), t1=(hv+S1+ch+K[j]+w[j])|0, S0=rr(2,a)^rr(13,a)^rr(22,a), maj=(a&b)^(a&c)^(b&c), t2=(S0+maj)|0; hv=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0; }
    h[0]=(h[0]+a)|0;h[1]=(h[1]+b)|0;h[2]=(h[2]+c)|0;h[3]=(h[3]+d)|0;h[4]=(h[4]+e)|0;h[5]=(h[5]+f)|0;h[6]=(h[6]+g)|0;h[7]=(h[7]+hv)|0;
  }
  var out=''; for(i=0;i<8;i++) out+=('00000000'+(h[i]>>>0).toString(16)).slice(-8); return out;
}
function currentHash(){ return localStorage.getItem(PW_KEY)||DEFAULT_HASH; }
function tryLogin(){ const v=document.getElementById("gatePw").value;
  if(sha256(v)===currentHash()){ sessionStorage.setItem("turncity_admin_ok","1"); document.getElementById("gate").classList.add("hide"); }
  else { document.getElementById("gateErr").textContent="비밀번호가 올바르지 않습니다."; document.getElementById("gatePw").value=""; } }
function logout(){ sessionStorage.removeItem("turncity_admin_ok"); location.reload(); }
function changePw(){ const a=prompt("새 비밀번호를 입력하세요"); if(a==null||a==="") return;
  const b=prompt("한 번 더 입력하세요"); if(a!==b){ alert("비밀번호가 일치하지 않습니다."); return; }
  const hh=sha256(a); localStorage.setItem(PW_KEY,hh);
  alert("변경되었습니다. (이 브라우저에 적용)\n\n다른 기기/브라우저에서도 쓰려면 admin.html 의 DEFAULT_HASH 값을 아래로 교체 후 재배포하세요:\n\n"+hh); }
(function gateInit(){
  if(sessionStorage.getItem("turncity_admin_ok")==="1") document.getElementById("gate").classList.add("hide");
  document.getElementById("gatePw").addEventListener("keydown",e=>{ if(e.key==="Enter") tryLogin(); });
})();

/* ============ 상태 ============ */
const LS = "turncity_admin_draft";
let state = load();
let tab = "news";       // news | guide
let selId = null;

function deepClone(o){return JSON.parse(JSON.stringify(o))}
function emptyState(){ return { news:[], guides:{groups:[]} }; }
function normalize(s){
  if(!s || typeof s!=="object") return emptyState();
  return { news: Array.isArray(s.news)?s.news:[],
           guides: (s.guides && Array.isArray(s.guides.groups)) ? s.guides : {groups:[]} };
}
/* data.js(window.TURN_DATA)가 없거나 깨져도 절대 예외를 던지지 않음 */
function fromData(){
  try{
    const d = window.TURN_DATA;
    if(!d) { console.warn("[admin] data.js(window.TURN_DATA) 없음 — 빈 상태로 시작"); return emptyState(); }
    return normalize({ news: deepClone(d.news||[]), guides: deepClone(d.guides||{groups:[]}) });
  }catch(e){ console.warn("[admin] fromData 실패:", e); return emptyState(); }
}
function load(){
  try{ const d=localStorage.getItem(LS); if(d) return normalize(JSON.parse(d)); }catch(e){ console.warn("[admin] 초안 파싱 실패:", e); }
  return fromData();
}
function persist(){ try{ localStorage.setItem(LS, JSON.stringify(state)); saveDot.textContent="자동저장됨 · "+new Date().toLocaleTimeString(); }catch(e){} }
function loadOriginal(){ if(confirm("현재 편집 내용을 버리고 data.js 원본을 불러올까요?")){ state=fromData(); localStorage.removeItem(LS); selId=null; renderAll(); toast("원본 불러옴"); } }

/* 가이드: 내부적으로 flat 배열로 다룸 */
function guideFlat(){
  const out=[];
  (state.guides.groups||[]).forEach(g=>(g.items||[]).forEach(it=>{
    if(it.items) it.items.forEach(c=>out.push({...c, group:g.title, parent:it.title}));
    else out.push({...it, group:g.title, parent:null});
  }));
  return out;
}
/* flat 배열 -> groups 구조 재조립 */
function rebuildGuides(flat){
  const groups=[];
  const gmap={};
  flat.forEach(p=>{
    let g=gmap[p.group]; if(!g){ g={title:p.group, items:[], _pmap:{}}; gmap[p.group]=g; groups.push(g); }
    const page={id:p.id,title:p.title,updated:p.updated,blocks:p.blocks};
    if(p.parent){ let par=g._pmap[p.parent]; if(!par){ par={title:p.parent, items:[]}; g._pmap[p.parent]=par; g.items.push(par);} par.items.push(page); }
    else g.items.push(page);
  });
  groups.forEach(g=>delete g._pmap);
  return {groups};
}

/* ============ 렌더 ============ */
function switchTab(t){ tab=t; selId=null; tabNews.classList.toggle("on",t==="news"); tabGuide.classList.toggle("on",t==="guide");
  listTitle.textContent = t==="news"?"소식 목록":"가이드 목록"; renderAll(); }

function renderAll(){ renderList(); renderEditor(); }

function renderList(){
  const el=document.getElementById("entryList");
  if(tab==="news"){
    const list=(state.news||[]).slice().sort((a,b)=>a.date<b.date?1:-1);
    el.innerHTML=list.map(p=>`<div class="entry ${p.id===selId?'sel':''}" onclick="select('${p.id}')">
      <div class="e-t">${esc(p.title)}</div>
      <div class="e-m"><span>${p.category==='patch'?'패치노트':'공지사항'}</span><span>·</span><span>${p.date}</span></div>

const BLOCK_ORDER=[“heading”,“paragraph”,“hint”,“list”,“code”,“table”,“tabs”,“expandable”,“cards”,“tier”,“quote”,“image”,“embed”,“steps”,“divider”];
const BLOCK_LABEL={heading:“제목”,paragraph:“문단”,hint:“힌트박스”,list:“리스트”,code:“코드”,table:“표”,tabs:“탭”,expandable:“토글”,cards:“카드”,tier:“등급표”,quote:“인용”,image:“이미지”,embed:“임베드”,steps:“단계”,divider:“구분선”};
function defBlock(t){
switch(t){
case “heading”: return {type:“heading”,level:2,text:“제목”};
case “paragraph”: return {type:“paragraph”,text:“내용을 입력하세요. **굵게**, *기울임*, `코드`, [링크](url) 지원.”};
case “hint”: return {type:“hint”,style:“info”,text:“참고할 내용을 적어주세요.”};
case “list”: return {type:“list”,style:“unordered”,items:[“항목 1”,“항목 2”]};
case “code”: return {type:“code”,title:“example.lua”,lang:“lua”,code:“print(‘hello’)”};
case “table”: return {type:“table”,headers:[“항목”,“값”],rows:[[“A”,“1”],[“B”,“2”]]};
case “tabs”: return {type:“tabs”,tabs:[{label:“탭1”,content:“내용1”},{label:“탭2”,content:“내용2”}]};
case “expandable”: return {type:“expandable”,title:“질문”,content:“답변”};
case “cards”: return {type:“cards”,cards:[{icon:“🎮”,title:“카드”,desc:“설명”,href:”#”}]};
case “tier”: return {type:“tier”,name:“VIP”,color:”#3d8bff”,sub:“누적 5만원”,benefits:[“혜택 1”,“혜택 2”]};
case “quote”: return {type:“quote”,text:“인용문”};
case “image”: return {type:“image”,src:””,caption:””};
case “embed”: return {type:“embed”,url:””};
case “steps”: return {type:“steps”,items:[{title:“1단계”,desc:“설명”}]};
case “divider”: return {type:“divider”};
}
}
function blocksArr(){ const e=currentEntry(); if(!e) return []; if(!e.blocks) e.blocks=[]; return e.blocks; }
function commitGuideBlocks(){ if(tab===“guide”){ const flat=guideFlat(); state.guides=rebuildGuides(flat); } }

function renderBlocks(){
const wrap=document.getElementById(“blockList”); if(!wrap) return;
const bs=blocksArr();
wrap.innerHTML=bs.map((b,i)=>` <div class="block-item"> <div class="bi-head"> <span class="bi-type">${BLOCK_LABEL[b.type]||b.type}</span><span class="spacer"></span> <button class="icobtn" onclick="moveBlock(${i},-1)" title="위로">▲</button> <button class="icobtn" onclick="moveBlock(${i},1)" title="아래로">▼</button> <button class="icobtn del" onclick="removeBlock(${i})" title="삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg></button> </div> <div class="bi-body">${blockFields(b,i)}</div> </div>`).join(””);
}
function blockFields(b,i){
const F=(label,val,field,ph=””)=>`<div class="field"><label>${label}</label><input value="${esc(val||"")}" placeholder="${ph}" oninput="setBlock(${i},'${field}',this.value)"></div>`;
const TA=(label,val,field,ph=””)=>`<div class="field"><label>${label}</label><textarea placeholder="${ph}" oninput="setBlock(${i},'${field}',this.value)">${esc(val||"")}</textarea></div>`;
switch(b.type){
case “heading”: return `<div class="row2"> <div class="field"><label>레벨</label><select onchange="setBlock(${i},'level',+this.value)"><option value="2" ${b.level!=3?'selected':''}>H2</option><option value="3" ${b.level==3?'selected':''}>H3</option></select></div> <div class="field"><label>텍스트</label><input value="${esc(b.text)}" oninput="setBlock(${i},'text',this.value)"></div></div>`;
case “paragraph”: return TA(“문단”,b.text,“text”);
case “quote”: return TA(“인용문”,b.text,“text”);
case “hint”: return `<div class="field"><label>종류</label><select onchange="setBlock(${i},'style',this.value)"> ${["info","success","warning","danger"].map(s=>`<option value=”${s}” ${b.style===s?‘selected’:’’}>${s}</option>`).join("")}</select></div>`+TA(“내용”,b.text,“text”);
case “code”: return `<div class="row2">${F("제목",b.title,"title","server.cfg")}${F("언어",b.lang,"lang","lua")}</div>`+TA(“코드”,b.code,“code”);
case “image”: return F(“이미지 URL”,b.src,“src”,“https://…”)+F(“캡션”,b.caption,“caption”);
case “embed”: return F(“URL (YouTube 등)”,b.url,“url”,“https://youtu.be/…”);
case “expandable”: return F(“제목”,b.title,“title”)+TA(“내용”,b.content,“content”);
case “list”: return `<div class="field"><label>스타일</label><select onchange="setBlock(${i},'style',this.value)"> <option value="unordered" ${b.style==='unordered'?'selected':''}>• 불릿</option> <option value="ordered" ${b.style==='ordered'?'selected':''}>1. 번호</option> <option value="task" ${b.style==='task'?'selected':''}>☑ 체크</option></select></div>`+
TA(“항목 (한 줄에 하나”+(b.style===‘task’?”, 완료는 앞에 [x]”:””)+”)”, listToText(b),”__list”,“항목1\n항목2”)+
`<div class="hintline">체크리스트: 완료 항목 앞에 <code class="ic">[x]</code></div>`;
case “table”: return F(“헤더 (| 로 구분)”,(b.headers||[]).join(” | “),”__theaders”,“항목 | 값”)+
TA(“행 (한 줄=한 행, | 로 셀 구분)”,(b.rows||[]).map(r=>r.join(” | “)).join(”\n”),”__trows”,“A | 1\nB | 2”);
case “tabs”: return TA(“탭 (한 줄=한 탭, 라벨 :: 내용)”,(b.tabs||[]).map(t=>`${t.label} :: ${t.content}`).join(”\n”),”__tabs”,“Windows :: 설명\nMac :: 설명”);
case “cards”: return TA(“카드 (한 줄=한 카드, 아이콘 :: 제목 :: 설명 :: 링크)”,(b.cards||[]).map(c=>`${c.icon||""} :: ${c.title||""} :: ${c.desc||""} :: ${c.href||"#"}`).join(”\n”),”__cards”,“🎮 :: 시작 :: 지금 접속 :: #”);
case “steps”: return TA(“단계 (한 줄=한 단계, 제목 :: 설명)”,(b.items||[]).map(s=>`${s.title} :: ${s.desc||""}`).join(”\n”),”__steps”,“설치 :: FiveM 설치\n접속 :: 서버 연결”);
case “tier”: return `<div class="row2">${F("등급명",b.name,"name")}<div class="field"><label>색상</label><input type="color" value="${b.color||'#3d8bff'}" oninput="setBlock(${i},'color',this.value)"></div></div>`+
F(“서브 (누적 금액 등)”,b.sub,“sub”,“누적 5만원”)+
TA(“혜택 (한 줄에 하나)”,(b.benefits||[]).join(”\n”),”__benefits”);
case “divider”: return `<div class="hintline">구분선 (설정 없음)</div>`;
}
return “”;
}
/* list 직렬화 */
function listToText(b){ if(b.style===“task”) return (b.items||[]).map(i=>(i.done?”[x] “:””)+ (i.text||””)).join(”\n”); return (b.items||[]).map(i=>typeof i===“string”?i:i.text).join(”\n”); }

function setBlock(i,field,val){
const bs=blocksArr(); const b=bs[i]; if(!b) return;
if(field===”__list”){ const lines=val.split(”\n”).filter(x=>x.trim()!==””);
b.items = b.style===“task” ? lines.map(l=>{const m=l.match(/^[x]\s*/i); return {text:l.replace(/^[x]\s*/i,””).replace(/^[ ]\s*/,””),done:!!m};}) : lines; }
else if(field===”__theaders”){ b.headers=val.split(”|”).map(s=>s.trim()); }
else if(field===”__trows”){ b.rows=val.split(”\n”).filter(x=>x.trim()!==””).map(r=>r.split(”|”).map(s=>s.trim())); }
else if(field===”__tabs”){ b.tabs=val.split(”\n”).filter(x=>x.trim()!==””).map(l=>{const [label,…rest]=l.split(”::”); return {label:(label||””).trim(),content:rest.join(”::”).trim()};}); }
else if(field===”__cards”){ b.cards=val.split(”\n”).filter(x=>x.trim()!==””).map(l=>{const p=l.split(”::”).map(s=>s.trim()); return {icon:p[0]||””,title:p[1]||””,desc:p[2]||””,href:p[3]||”#”};}); }
else if(field===”__steps”){ b.items=val.split(”\n”).filter(x=>x.trim()!==””).map(l=>{const p=l.split(”::”); return {title:(p[0]||””).trim(),desc:(p.slice(1).join(”::”)||””).trim()};}); }
else if(field===”__benefits”){ b.benefits=val.split(”\n”).filter(x=>x.trim()!==””); }
else { b[field]=val; if(field===“style”){ renderBlocks(); } }
commitGuideBlocks(); persist(); updatePreview();
}
function addBlock(t){ blocksArr().push(defBlock(t)); document.getElementById(“typeMenu”).classList.remove(“open”); commitGuideBlocks(); persist(); renderBlocks(); updatePreview(); }
function removeBlock(i){ blocksArr().splice(i,1); commitGuideBlocks(); persist(); renderBlocks(); updatePreview(); }
function moveBlock(i,d){ const bs=blocksArr(); const j=i+d; if(j<0||j>=bs.length) return; [bs[i],bs[j]]=[bs[j],bs[i]]; commitGuideBlocks(); persist(); renderBlocks(); updatePreview(); }
function toggleTypeMenu(e){ e.stopPropagation(); document.getElementById(“typeMenu”).classList.toggle(“open”); }

function esc(s=””){return String(s).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”);}

/* ============ 가이드 드래그 정렬 ============ */
let dragId=null;
let dragGroup=null;
function setupDnD(){
const c=document.getElementById(“entryList”);
c.addEventListener(“dragstart”,e=>{
if(tab!==“guide”){ e.preventDefault(); return; }
const gl=e.target.closest(”.glabel.drag-grp”);
if(gl){ dragGroup=gl.dataset.group; gl.classList.add(“dragging”); c.classList.add(“drag-group”);
e.dataTransfer.effectAllowed=“move”; try{e.dataTransfer.setData(“text/plain”,dragGroup);}catch(*){}
return; }
const el=e.target.closest(”.entry.drag”); if(!el){ e.preventDefault(); return; }
dragId=el.dataset.id; el.classList.add(“dragging”); c.classList.add(“drag-page”);
e.dataTransfer.effectAllowed=“move”; try{e.dataTransfer.setData(“text/plain”,dragId);}catch(*){}
});
c.addEventListener(“dragover”,e=>{
if(dragGroup){ e.preventDefault(); e.dataTransfer.dropEffect=“move”;
const dragging=c.querySelector(”.glabel.dragging”); if(!dragging) return;
const after=getDragAfterGroup(c,e.clientY);
if(after==null) c.appendChild(dragging); else c.insertBefore(dragging,after);
return; }
if(!dragId) return; e.preventDefault(); e.dataTransfer.dropEffect=“move”;
const dragging=c.querySelector(”.entry.dragging”); if(!dragging) return;
const after=getDragAfterElement(c,e.clientY);
if(after==null) c.appendChild(dragging); else c.insertBefore(dragging,after);
});
c.addEventListener(“drop”,e=>{ if(dragId||dragGroup) e.preventDefault(); });
c.addEventListener(“dragend”,()=>{
c.querySelectorAll(”.dragging”).forEach(x=>x.classList.remove(“dragging”));
c.classList.remove(“drag-page”,“drag-group”);
if(dragGroup){ commitGroupOrder(); dragGroup=null; }
else if(dragId){ commitGuideOrder(); dragId=null; }
});
}
function getDragAfterGroup(c,y){
const els=[…c.querySelectorAll(”.glabel.drag-grp:not(.dragging)”)];
let closest={offset:-Infinity,el:null};
els.forEach(el=>{ const box=el.getBoundingClientRect(); const offset=y-box.top-box.height/2;
if(offset<0&&offset>closest.offset) closest={offset,el}; });
return closest.el;
}
function commitGroupOrder(){
const c=document.getElementById(“entryList”);
const order=[…c.querySelectorAll(”.glabel.drag-grp”)].map(g=>g.dataset.group);
const map={}; (state.guides.groups||[]).forEach(g=>map[g.title]=g);
const seen={}; const newGroups=[];
order.forEach(t=>{ if(map[t]&&!seen[t]){ newGroups.push(map[t]); seen[t]=1; } });
(state.guides.groups||[]).forEach(g=>{ if(!seen[g.title]){ newGroups.push(g); seen[g.title]=1; } });
state.guides={groups:newGroups};
persist(); renderList(); toast(“그룹 순서 변경됨”);
}
function getDragAfterElement(c,y){
const els=[…c.querySelectorAll(”.entry.drag:not(.dragging)”)];
let closest={offset:-Infinity,el:null};
els.forEach(el=>{ const box=el.getBoundingClientRect(); const offset=y-box.top-box.height/2;
if(offset<0&&offset>closest.offset) closest={offset,el}; });
return closest.el;
}
function commitGuideOrder(){
const c=document.getElementById(“entryList”);
const order=[…c.querySelectorAll(”.entry.drag”)].map(el=>el.dataset.id);
const snap={}; guideFlat().forEach(p=>snap[p.id]=p);
// 드래그된 항목은 새 이웃의 그룹/하위그룹을 따라감
const idx=order.indexOf(dragId);
const neighborId = order[idx-1] ?? order[idx+1];
if(neighborId && snap[dragId] && snap[neighborId]){
snap[dragId].group  = snap[neighborId].group;
snap[dragId].parent = snap[neighborId].parent;
}
const newFlat=order.map(id=>snap[id]).filter(Boolean);
state.guides=rebuildGuides(newFlat);
persist(); renderList(); toast(“순서 변경됨 · 내보내기 후 반영”);
}

let toastTimer; function toast(msg){ const t=document.getElementById(“toast”); t.textContent=msg; t.classList.add(“show”); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove(“show”),2200); }

/* ============ Markdown / GitBook 임포터 ============ */
function mdToBlocks(md){
const lines=(md||””).replace(/\r\n/g,”\n”).split(”\n”);
const blocks=[]; let i=0; const buf=[];
const flush=()=>{ const t=buf.join(”\n”).trim(); if(t) blocks.push({type:“paragraph”,text:t}); buf.length=0; };
const until=(re)=>{ const o=[]; i++; while(i<lines.length && !re.test(lines[i])){ o.push(lines[i]); i++; } i++; return o; };
while(i<lines.length){
const line=lines[i], t=line.trim(); let m;
if(/^`/.test(t)){ flush(); const lang=t.replace(/^`/,””).trim(); const code=until(/^```/); blocks.push({type:“code”,lang,title:lang||“code”,code:code.join(”\n”)}); continue; }
if(m=t.match(/^{%\s*hint\s+style=[”’]?(\w+)[”’]?\s*%}/)){ flush(); const st=[“info”,“success”,“warning”,“danger”].includes(m[1])?m[1]:“info”; const b=until(/{%\s*endhint\s*%}/); blocks.push({type:“hint”,style:st,text:b.join(”\n”).trim()}); continue; }
if(/^{%\s*tabs\s*%}/.test(t)){ flush(); const tabs=[]; i++;
while(i<lines.length && !/{%\s*endtabs\s*%}/.test(lines[i])){ const tm=lines[i].trim().match(/^{%\s*tab\s+title=[”’]?(.+?)[”’]?\s*%}/);
if(tm){ const cb=[]; i++; while(i<lines.length && !/{%\s*endtab\s*%}/.test(lines[i]) && !/{%\s*endtabs\s*%}/.test(lines[i])){ cb.push(lines[i]); i++; } if(/{%\s*endtab\s*%}/.test(lines[i]||””)) i++; tabs.push({label:tm[1],content:cb.join(”\n”).trim()}); }
else i++; } i++; if(tabs.length) blocks.push({type:“tabs”,tabs}); continue; }
if(m=t.match(/^{%\s*(?:expand|details)\s+title=[”’]?(.+?)[”’]?\s*%}/)){ flush(); const b=until(/{%\s*end(?:expand|details)\s*%}/); blocks.push({type:“expandable”,title:m[1],content:b.join(”\n”).trim()}); continue; }
if(/^<details>/i.test(t)){ flush(); const inner=[]; i++; while(i<lines.length && !/</details>/i.test(lines[i])){ inner.push(lines[i]); i++; } i++;
const j=inner.join(”\n”); const sm=j.match(/<summary>([\s\S]*?)</summary>/i); const title=sm?sm[1].trim():“자세히”; const content=j.replace(/<summary>[\s\S]*?</summary>/i,””).trim(); blocks.push({type:“expandable”,title,content}); continue; }
if(m=t.match(/^{%\s*embed\s+url=[”’]?(.+?)[”’]?\s*%}/)){ flush(); blocks.push({type:“embed”,url:m[1]}); i++; continue; }
if(m=t.match(/^(#{1,6})\s+(.*)$/)){ flush(); blocks.push({type:“heading”,level:m[1].length<=2?2:3,text:m[2].trim()}); i++; continue; }
if(/^(-{3,}|*{3,}|_{3,})$/.test(t)){ flush(); blocks.push({type:“divider”}); i++; continue; }
if(/^>\s?/.test(t)){ flush(); const b=[]; while(i<lines.length && /^\s*>\s?/.test(lines[i])){ b.push(lines[i].replace(/^\s*>\s?/,””)); i++; } blocks.push({type:“quote”,text:b.join(” “).trim()}); continue; }
if(/^|.*|/.test(t) && i+1<lines.length && /-/.test(lines[i+1]) && /^|?[\s:|-]+|?$/.test(lines[i+1].trim())){
flush(); const row=(s)=>s.trim().replace(/^|/,””).replace(/|$/,””).split(”|”).map(x=>x.trim());
const headers=row(lines[i]); i+=2; const rows=[]; while(i<lines.length && /^|.*|/.test(lines[i].trim())){ rows.push(row(lines[i])); i++; } blocks.push({type:“table”,headers,rows}); continue; }
if(/^[-*]\s+[[ xX]]/.test(t)){ flush(); const items=[]; while(i<lines.length && /^\s*[-*]\s+[[ xX]]/.test(lines[i])){ const lm=lines[i].trim().match(/^[-*]\s+[([ xX])]\s*(.*)$/); items.push({text:lm[2],done:/x/i.test(lm[1])}); i++; } blocks.push({type:“list”,style:“task”,items}); continue; }
if(/^[-*+]\s+/.test(t)){ flush(); const items=[]; while(i<lines.length && /^\s*[-*+]\s+/.test(lines[i]) && !/^\s*[-*]\s+[[ xX]]/.test(lines[i])){ items.push(lines[i].trim().replace(/^[-*+]\s+/,””)); i++; } blocks.push({type:“list”,style:“unordered”,items}); continue; }
if(/^\d+.\s+/.test(t)){ flush(); const items=[]; while(i<lines.length && /^\s*\d+.\s+/.test(lines[i])){ items.push(lines[i].trim().replace(/^\d+.\s+/,””)); i++; } blocks.push({type:“list”,style:“ordered”,items}); continue; }
if(m=t.match(/^![(.*?)]((.*?))/)){ flush(); blocks.push({type:“image”,src:m[2],caption:m[1]}); i++; continue; }
if(t===””){ flush(); i++; continue; }
if(/^{%[\s\S]*%}$/.test(t)){ i++; continue; }   // 기타 GitBook 태그 무시
buf.push(line); i++;
}
flush(); return blocks;
}
function openImport(){ document.getElementById(“impTarget”).value=tab; document.getElementById(“mdModal”).classList.add(“open”); }
function closeImport(){ document.getElementById(“mdModal”).classList.remove(“open”); }
document.getElementById(“mdModal”).addEventListener(“click”,e=>{ if(e.target.id===“mdModal”) closeImport(); });
function doImport(){
const md=document.getElementById(“impText”).value;
if(!md.trim()){ alert(“마크다운을 붙여넣으세요.”); return; }
let title=document.getElementById(“impTitle”).value.trim();
const target=document.getElementById(“impTarget”).value;
let text=md; const h1=text.match(/^\s*#\s+(.+)$/m);
if(!title && h1) title=h1[1].trim();
if(h1) text=text.replace(h1[0],””);     // 제목 라인 제거(본문 중복 방지)
const blocks=mdToBlocks(text);
if(!blocks.length){ alert(“변환할 내용이 없습니다.”); return; }
if(!title) title=“가져온 문서”;
const rid=Date.now().toString(36);
if(target===“news”){ const today=new Date().toISOString().slice(0,10);
const n={id:“post-”+rid,category:“patch”,title,date:today,summary:””,blocks}; state.news.unshift(n);
tab=“news”; selId=n.id; tabNews.classList.add(“on”); tabGuide.classList.remove(“on”); }
else{ const flat=guideFlat(); flat.push({id:“page-”+rid,title,group:“가이드”,parent:null,updated:””,blocks});
state.guides=rebuildGuides(flat); tab=“guide”; selId=“page-”+rid; tabGuide.classList.add(“on”); tabNews.classList.remove(“on”); }
listTitle.textContent = tab===“news”?“소식 목록”:“가이드 목록”;
persist(); closeImport();
document.getElementById(“impText”).value=””; document.getElementById(“impTitle”).value=””;
renderAll(); toast(blocks.length+“개 블록 가져옴”);
}

/* ============ 백엔드 저장/불러오기 ============ */
const API_BASE_KEY=“turncity_api_base”, API_TOKEN_KEY=“turncity_api_token”;
const API_BASE_DEFAULT = “https://turnsite-production.up.railway.app”;  // ← 기본값 하드코딩(다른 기기에서도 동작)
function apiBase(){ return (localStorage.getItem(API_BASE_KEY) || window.TURN_API_BASE || API_BASE_DEFAULT || “”).replace(//+$/,””); }
function apiToken(){ return localStorage.getItem(API_TOKEN_KEY)||””; }
function serverConfig(){
const b=prompt(“서버 API 주소를 입력하세요 (예: https://turncity-api.up.railway.app)”, apiBase());
if(b===null) return;
localStorage.setItem(API_BASE_KEY, b.trim().replace(//+$/,””));
const t=prompt(“저장 토큰 (Railway 의 ADMIN_TOKEN 과 동일하게)”, apiToken());
if(t!==null) localStorage.setItem(API_TOKEN_KEY, t.trim());
toast(“서버 설정 저장됨”);
}
async function serverLoad(){
if(!apiBase()){ serverConfig(); if(!apiBase()) return; }
try{
const r=await fetch(apiBase()+”/api/data”,{cache:“no-store”});
if(!r.ok) throw new Error(“HTTP “+r.status);
const d=await r.json();
if(!confirm(“서버 콘텐츠를 불러옵니다. 현재 편집 중인 내용은 덮어써집니다. 계속할까요?”)) return;
state={news:d.news||[], guides:d.guides||{groups:[]}};
selId=null; persist(); renderAll(); toast(“서버에서 불러옴”);
}catch(e){ alert(“불러오기 실패: “+e.message+”\n\n서버 주소와 CORS 설정을 확인하세요.”); }
}
async function serverSave(){
if(!apiBase()||!apiToken()){ serverConfig(); if(!apiBase()||!apiToken()) return; }
saveDot.textContent=“저장 중…”;
try{
const r=await fetch(apiBase()+”/api/data”,{
method:“POST”,
headers:{“Content-Type”:“application/json”,“Authorization”:“Bearer “+apiToken()},
body:JSON.stringify({news:state.news,guides:state.guides})
});
if(r.status===401){ alert(“토큰이 올바르지 않습니다. ‘서버 설정’에서 토큰을 확인하세요.”); saveDot.textContent=“저장 실패”; return; }
if(!r.ok) throw new Error(“HTTP “+r.status);
const j=await r.json();
saveDot.textContent=“서버 저장됨 · “+new Date().toLocaleTimeString();
toast(“서버에 저장됨 — 사이트에 즉시 반영”);
}catch(e){ alert(“저장 실패: “+e.message+”\n\n서버 주소/CORS/토큰을 확인하세요.”); saveDot.textContent=“저장 실패”; }
}

/* ============ 부팅 (에러를 숨기지 않음) ============ */
function fatalBanner(msg){
let b=document.getElementById(“fatalBar”);
if(!b){ b=document.createElement(“div”); b.id=“fatalBar”;
b.style.cssText=“position:fixed;top:0;left:0;right:0;z-index:300;background:#f43f5e;color:#fff;font-weight:700;font-size:13px;padding:10px 14px;text-align:center”;
document.body.appendChild(b); }
b.textContent=“오류: “+msg;
}
window.addEventListener(“error”, e=>{ fatalBanner((e.message||“알 수 없는 오류”)+” @ “+(e.filename||””).split(”/”).pop()+”:”+e.lineno); });

/* data.js 가 없어서 빈 상태로 시작한 경우 → 서버에서 자동 로드 */
async function boot(){
setupDnD();
renderAll();
const empty = (state.news.length===0) && ((state.guides.groups||[]).length===0);
const hadDraft = !!localStorage.getItem(LS);
if(empty && !hadDraft && apiBase()){
try{
const r=await fetch(apiBase()+”/api/data”,{cache:“no-store”});
if(!r.ok) throw new Error(“HTTP “+r.status);
const d=await r.json();
state=normalize({news:d.news, guides:d.guides});
renderAll();
toast(“서버에서 콘텐츠 불러옴”);
}catch(e){
fatalBanner(“data.js 도 없고 서버 로드도 실패했습니다 (”+e.message+”). ‘서버 설정’에서 주소를 확인하세요.”);
}
}
}
boot();
</script>
