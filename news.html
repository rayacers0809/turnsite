<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소식 · TURN CITY</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="solid">
  <div class="wrap nav">
    <a class="logo" href="index.html"><span class="mark"></span><span class="name">TURN CITY</span></a>
    <nav class="nav-center">
      <a href="news.html" class="active">소식</a>
      <a href="guide.html">가이드</a>
      <a href="#">디스코드</a>
    </nav>
    <div class="nav-right"><a class="login" href="#">로그인</a><a class="btn-start" href="#">GAME START</a></div>
  </div>
</header>

<div class="page-top"></div>

<!-- FEATURED (최신 글) -->
<section class="featured">
  <div class="wrap featured-grid">
    <div class="reveal in">
      <div class="feat-meta"><span class="badge-inline" id="fBadge">패치노트</span><span id="fDate"></span></div>
      <h1 class="feat-title" id="fTitle"></h1>
      <p class="feat-desc" id="fDesc"></p>
      <a class="pill solid" id="fLink" href="#" style="margin-top:28px">최신소식 읽기
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
    <a class="feat-thumb reveal in" data-d="1" id="fThumb" href="#"></a>
  </div>
</section>

<!-- LIST -->
<section class="list-sec">
  <div class="wrap">
    <h2 class="reveal in">새 소식</h2>
    <div class="toolbar reveal in">
      <div class="filters" id="filters">
        <button class="on" data-cat="all">전체</button>
        <button data-cat="notice">공지사항</button>
        <button data-cat="patch">패치노트</button>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="제목, 내용 검색...">
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="pager">
      <button id="prev">‹ 이전</button>
      <span class="count" id="count">1 / 1</span>
      <button class="next" id="next">다음 ›</button>
    </div>
  </div>
</section>

<footer data-auto></footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const CAT = { patch: "패치노트", notice: "공지사항" };
  const ALL = TURN.news();

  // featured = 최신
  const f = ALL[0];
  if (f) {
    fBadge.textContent = CAT[f.category] || "소식";
    fDate.textContent = f.date.replace(/-/g, ". ") + ".";
    fTitle.textContent = f.title;
    fDesc.textContent = f.summary;
    fLink.href = "article.html?id=" + f.id;
    fThumb.href = "article.html?id=" + f.id;
  }

  const PER = 9; let cat = "all", q = "", page = 1;
  const grid = document.getElementById("grid"), countEl = document.getElementById("count");
  const prev = document.getElementById("prev"), next = document.getElementById("next");
  const io = new IntersectionObserver((e) => e.forEach(x => { if (x.isIntersecting) { x.target.classList.add("in"); io.unobserve(x.target); } }), { threshold: .1 });

  const filtered = () => ALL.filter(p => (cat === "all" || p.category === cat) && (q === "" || (p.title + p.summary).toLowerCase().includes(q)));
  function render() {
    const list = filtered(), pages = Math.max(1, Math.ceil(list.length / PER));
    if (page > pages) page = pages;
    const slice = list.slice((page - 1) * PER, page * PER);
    grid.innerHTML = slice.length ? slice.map((p, i) => `
      <a class="card reveal" data-d="${(i % 3) + 1}" href="article.html?id=${p.id}">
        <div class="card-thumb"><span class="badge">${CAT[p.category] || "소식"}</span></div>
        <div class="card-body">
          <div class="card-meta"><span class="tag">${CAT[p.category] || "소식"}</span><span class="dot"></span><span>${p.date.replace(/-/g, ".")}</span></div>
          <div class="card-title">${p.title}</div>
        </div>
      </a>`).join("") : `<div class="empty">검색 결과가 없습니다.</div>`;
    grid.querySelectorAll(".reveal").forEach(el => io.observe(el));
    countEl.textContent = `${page} / ${pages}`;
    prev.disabled = page <= 1; next.disabled = page >= pages;
  }
  document.getElementById("filters").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    [...e.currentTarget.children].forEach(x => x.classList.remove("on"));
    b.classList.add("on"); cat = b.dataset.cat; page = 1; render();
  });
  document.getElementById("searchInput").addEventListener("input", e => { q = e.target.value.trim().toLowerCase(); page = 1; render(); });
  prev.addEventListener("click", () => { if (page > 1) { page--; render(); scrollUp(); } });
  next.addEventListener("click", () => { page++; render(); scrollUp(); });
  function scrollUp() { (window.__lenis ? window.__lenis.scrollTo(0) : window.scrollTo({ top: 0, behavior: "smooth" })); }
  render();
</script>
</body>
</html>
