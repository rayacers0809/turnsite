<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소식 · TURN CITY</title>
<meta name="theme-color" content="#3B6FF5">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="turn.css">
</head>
<body>

<header class="tc-top">
  <div class="wrap tc-top-in">
    <a class="tc-brand" href="index.html">
      <span class="mk"></span>
      <span class="wm">TURN <i>CITY</i></span>
    </a>
    <nav class="tc-menu" id="menu">
      <a href="news.html" class="on">소식</a>
      <a href="guide.html">가이드</a>
      <a href="https://discord.gg/2026turn" target="_blank" rel="noopener">디스코드</a>
    </nav>
    <div class="tc-top-r">
      <span class="tc-status"><span class="lamp"></span>SERVER ONLINE</span>
      <button class="tc-burger" id="burger" aria-label="메뉴">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
      <a class="tc-enter" href="https://cfx.re/join/xlzdevr" target="_blank" rel="noopener">GAME START</a>
    </div>
  </div>
</header>

<section class="tc-band">
  <div class="wrap">
    <h1 class="reveal in">소식</h1>
    <p class="reveal in" data-d="1">서버 업데이트와 공지를 여기에 올립니다. 최신 글이 맨 위입니다.</p>
  </div>
</section>

<section class="tc-sec">
  <div class="wrap">
    <div class="tc-tools reveal in">
      <div class="tc-tabs" id="tabs">
        <button class="on" data-cat="all">전체</button>
        <button data-cat="notice">공지사항</button>
        <button data-cat="patch">패치노트</button>
      </div>
      <label class="tc-seek">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="seek" type="text" placeholder="제목으로 찾기">
      </label>
    </div>

    <div class="tc-feed" id="feed"></div>

    <div class="tc-page">
      <button id="prev">이전</button>
      <span class="idx" id="idx">1 / 1</span>
      <button id="next">다음</button>
    </div>
  </div>
</section>

<footer data-auto></footer>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
TURN.ready(function(){

  const CAT = { patch: "패치노트", notice: "공지사항" };
  const ALL = TURN.news();

  document.getElementById("burger").addEventListener("click", () => {
    document.getElementById("menu").classList.toggle("open");
  });

  const PER = 10;
  let cat = "all", q = "", page = 1;
  const feed = document.getElementById("feed");
  const idxEl = document.getElementById("idx");
  const prev = document.getElementById("prev");
  const next = document.getElementById("next");

  const io = new IntersectionObserver(e => e.forEach(x => {
    if (x.isIntersecting) { x.target.classList.add("in"); io.unobserve(x.target); }
  }), { threshold: .1 });

  const pick = () => ALL.filter(p =>
    (cat === "all" || p.category === cat) &&
    (q === "" || (p.title + (p.summary || "")).toLowerCase().includes(q))
  );

  function render() {
    const list = pick();
    const pages = Math.max(1, Math.ceil(list.length / PER));
    if (page > pages) page = pages;

    const slice = list.slice((page - 1) * PER, page * PER);
    feed.innerHTML = slice.length ? slice.map((p, i) => `
      <a class="tc-item reveal" data-d="${(i % 3) + 1}" href="article.html?id=${p.id}">
        <span class="tc-shot"></span>
        <span>
          <span class="tc-it-m">
            <span class="tc-chip ${p.category}">${CAT[p.category] || "소식"}</span>
            <span class="tc-when">${p.date.replace(/-/g, ".")}</span>
          </span>
          <span class="tc-it-t">${p.title}</span>
          ${p.summary ? `<span class="tc-it-d">${p.summary}</span>` : ""}
        </span>
        <svg class="tc-go" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg>
      </a>`).join("")
      : `<div class="tc-none">찾는 글이 없습니다.<br>다른 단어로 검색하거나 필터를 전체로 바꿔보세요.</div>`;

    feed.querySelectorAll(".reveal").forEach(el => io.observe(el));
    idxEl.textContent = `${page} / ${pages}`;
    prev.disabled = page <= 1;
    next.disabled = page >= pages;
  }

  document.getElementById("tabs").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    [...e.currentTarget.children].forEach(x => x.classList.remove("on"));
    b.classList.add("on"); cat = b.dataset.cat; page = 1; render();
  });
  document.getElementById("seek").addEventListener("input", e => {
    q = e.target.value.trim().toLowerCase(); page = 1; render();
  });
  const up = () => (window.__lenis ? window.__lenis.scrollTo(0) : window.scrollTo({ top: 0, behavior: "smooth" }));
  prev.addEventListener("click", () => { if (page > 1) { page--; render(); up(); } });
  next.addEventListener("click", () => { page++; render(); up(); });

  render();

});
</script>
</body>
</html>
