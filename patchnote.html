<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소식 | Turn City</title>
<meta property="og:type" content="website">
<meta property="og:url" content="https://turncity.kr/patchnote">
<meta property="og:title" content="소식 | Turn City">
<meta property="og:description" content="Turn City의 최신 업데이트 내역을 확인하세요.">
<meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/mochi-f81d3.firebasestorage.app/o/site%2Ficon.png?alt=media">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#2f7dff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#2f7dff;--pd:#1d6fff;--peach:#41d6ff;
  --bg:#0e0c0f;--bg2:#161318;--card:#1c181f;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:rgba(255,255,255,.9);--mu:rgba(255,255,255,.45);--mu2:rgba(255,255,255,.65);
  --grad:linear-gradient(135deg,var(--pd),var(--peach));
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:transparent;color:var(--text);font-weight:400;overflow-x:hidden;min-height:100vh}

/* 배경 */
#bgWrap{position:fixed;inset:0;z-index:0}
#bgVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;opacity:0;transition:opacity 1.2s ease;z-index:2}
#bgVideo.loaded{opacity:.6}
#bgSlides{position:absolute;inset:0;z-index:0}
.bg-slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.5s ease}
.bg-slide.active{opacity:.6}
#bgOverlay{position:absolute;inset:0;z-index:3;background:rgba(14,12,15,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* 네비 */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 40px;background:rgba(14,12,15,.75);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.nav-logo img{width:34px;height:34px;border-radius:9px;object-fit:cover;display:none}
.nav-logo-text{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;justify-content:center}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--mu2);text-decoration:none;padding:7px 14px;border-radius:8px;transition:color .15s,background .15s}
.nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.07)}
.nav-r{display:flex;align-items:center;gap:10px;justify-content:flex-end}
.nav-discord{display:flex;align-items:center;gap:7px;padding:8px 18px;border-radius:100px;background:rgba(88,101,242,.2);border:1px solid rgba(88,101,242,.4);color:#7289da;font-size:13px;font-weight:700;text-decoration:none;transition:all .2s}
.nav-discord:hover{background:rgba(88,101,242,.3)}
.nav-start{padding:8px 20px;border-radius:100px;background:var(--grad);color:#fff;font-size:13px;font-weight:700;text-decoration:none;box-shadow:0 4px 16px rgba(47,125,255,.35);transition:opacity .2s,transform .15s}
.nav-start:hover{opacity:.88;transform:translateY(-1px)}

/* 페이지 공통 */
.page{position:relative;z-index:10}
.container{max-width:1100px;margin:0 auto;padding:0 40px}

/* ── 리스트 뷰 ── */
#listView{}

/* 피처드 히어로 */
.featured{padding-top:96px;padding-bottom:60px;border-bottom:1px solid var(--border)}
.featured-inner{max-width:1100px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1fr 380px;gap:60px;align-items:center}
.featured-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;background:rgba(56,189,248,.15);color:#38bdf8;letter-spacing:.05em;margin-bottom:14px}
.featured-date{font-size:12px;color:var(--mu);margin-bottom:10px}
.featured-title{font-family:'Nunito',sans-serif;font-size:clamp(24px,3.5vw,40px);font-weight:900;line-height:1.2;color:#fff;margin-bottom:14px;letter-spacing:-.02em}
.featured-desc{font-size:14px;color:var(--mu2);line-height:1.75;margin-bottom:28px}
.featured-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:100px;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);font-size:13.5px;font-weight:600;text-decoration:none;cursor:pointer;background:none;font-family:inherit;transition:all .2s}
.featured-btn:hover{border-color:rgba(47,125,255,.5);color:#fff;background:rgba(47,125,255,.08)}
.featured-thumb{border-radius:16px;overflow:hidden;border:1px solid var(--border2);background:var(--card);aspect-ratio:16/10;display:flex;align-items:center;justify-content:center}
.featured-thumb img{width:100%;height:100%;object-fit:cover}
.featured-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(47,125,255,.12),rgba(65,214,255,.07));font-size:52px;opacity:.35}

/* 필터 + 검색 */
.filter-bar{max-width:1100px;margin:0 auto;padding:32px 40px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:6px}
.filter-tab{padding:7px 18px;border-radius:100px;font-size:13px;font-weight:600;border:1.5px solid var(--border);color:var(--mu2);background:none;cursor:pointer;font-family:inherit;transition:all .15s}
.filter-tab:hover{border-color:var(--border2);color:#fff}
.filter-tab.active{background:rgba(47,125,255,.12);border-color:rgba(47,125,255,.4);color:var(--pink)}
.filter-search{position:relative}
.filter-search input{padding:8px 14px 8px 36px;border-radius:100px;border:1.5px solid var(--border);background:rgba(255,255,255,.05);color:#fff;font-size:13px;font-family:inherit;outline:none;width:220px;transition:border-color .2s}
.filter-search input:focus{border-color:rgba(47,125,255,.4)}
.filter-search input::placeholder{color:var(--mu)}
.filter-search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:13px;pointer-events:none}

/* 그리드 */
.grid-wrap{max-width:1100px;margin:0 auto;padding:0 40px 60px}
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s}
.news-card:hover{border-color:rgba(47,125,255,.35);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.35)}
.nc-thumb{aspect-ratio:16/9;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center}
.nc-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.news-card:hover .nc-thumb img{transform:scale(1.04)}
.nc-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(47,125,255,.1),rgba(65,214,255,.07));font-size:32px;opacity:.4}
.nc-body{padding:16px 18px 18px}
.nc-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nc-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:.04em}
.nc-tag.t-patch{background:rgba(56,189,248,.15);color:#38bdf8}
.nc-tag.t-notice{background:rgba(167,139,250,.15);color:#a78bfa}
.nc-tag.t-new{background:rgba(74,222,128,.15);color:#4ade80}
.nc-tag.t-fix{background:rgba(251,146,60,.15);color:#fb923c}
.nc-tag.t-change{background:rgba(47,125,255,.15);color:var(--pink)}
.nc-date{font-size:11px;color:var(--mu)}
.nc-title{font-size:15px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:6px}
.nc-desc{font-size:12.5px;color:var(--mu);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* 페이지네이션 */
.pagination{display:flex;align-items:center;justify-content:center;gap:12px;padding:0 40px 80px}
.page-btn{padding:8px 22px;border-radius:100px;border:1.5px solid var(--border);color:var(--mu2);background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.page-btn:hover:not(:disabled){border-color:rgba(47,125,255,.4);color:var(--pink)}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.page-info{font-size:13px;color:var(--mu);font-weight:600;min-width:60px;text-align:center}

/* ── 디테일 뷰 ── */
#detailView{display:none;padding-top:80px}
.detail-back{max-width:800px;margin:0 auto;padding:24px 40px 0;display:flex;align-items:center;gap:8px;color:var(--mu2);font-size:13px;font-weight:600;cursor:pointer;transition:color .15s;width:fit-content}
.detail-back:hover{color:#fff}
.detail-back svg{transition:transform .15s}
.detail-back:hover svg{transform:translateX(-3px)}
.detail-thumb{max-width:800px;margin:20px auto 0;padding:0 40px}
.detail-thumb img{width:100%;border-radius:16px;object-fit:cover;border:1px solid var(--border);max-height:400px}
.detail-thumb-ph{width:100%;aspect-ratio:16/9;border-radius:16px;background:linear-gradient(135deg,rgba(47,125,255,.12),rgba(65,214,255,.07));display:flex;align-items:center;justify-content:center;font-size:60px;opacity:.3;border:1px solid var(--border)}
.detail-body{max-width:800px;margin:0 auto;padding:28px 40px 80px}
.detail-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.detail-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px}
.detail-date{font-size:12px;color:var(--mu)}
.detail-title{font-family:'Nunito',sans-serif;font-size:clamp(24px,4vw,38px);font-weight:900;line-height:1.2;color:#fff;margin-bottom:8px;letter-spacing:-.02em}
.detail-ver{font-size:13px;color:var(--mu);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
/* 마크다운 콘텐츠 */
.detail-content h1,.detail-content h2,.detail-content h3{font-family:'Nunito',sans-serif;font-weight:800;color:#fff;margin:28px 0 12px;line-height:1.3}
.detail-content h2{font-size:20px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.detail-content h3{font-size:17px}
.detail-content p{font-size:14px;line-height:1.9;color:var(--mu2);margin:10px 0}
.detail-content ul,.detail-content ol{margin:10px 0 10px 20px;display:flex;flex-direction:column;gap:5px}
.detail-content li{font-size:14px;line-height:1.8;color:var(--mu2)}
.detail-content li>ul{margin:4px 0 4px 16px}
.detail-content strong{color:#fff;font-weight:600}
.detail-content blockquote{margin:14px 0;padding:10px 18px;border-left:3px solid var(--pink);background:rgba(47,125,255,.07);border-radius:0 8px 8px 0;font-size:13.5px;color:var(--mu2);line-height:1.8}
.detail-content blockquote p{margin:0}
.detail-content img{max-width:100%;border-radius:10px;border:1px solid var(--border);margin:16px 0;cursor:zoom-in}
.detail-content table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px}
.detail-content th{text-align:left;padding:9px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);font-weight:700;color:#fff}
.detail-content td{padding:9px 14px;border:1px solid var(--border);color:var(--mu2);line-height:1.7}
.detail-content hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.detail-content .callout{display:flex;align-items:flex-start;gap:10px;border-radius:8px;padding:12px 16px;margin:14px 0;border-left:4px solid}
.detail-content .callout-warning{background:rgba(251,146,60,.08);border-color:#fb923c}
.detail-content .callout-info{background:rgba(56,189,248,.08);border-color:#38bdf8}
.detail-content .callout-tip{background:rgba(74,222,128,.08);border-color:#4ade80}
.detail-content .callout-danger{background:rgba(248,113,113,.08);border-color:#f87171}
/* 이전 패치노트 버튼 */
.detail-nav{margin-top:40px;padding-top:28px;border-top:1px solid var(--border)}
.detail-prev-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;border:1px solid var(--border);color:var(--mu2);font-size:13px;cursor:pointer;background:none;font-family:inherit;transition:all .15s}
.detail-prev-btn:hover{border-color:rgba(47,125,255,.4);color:var(--pink)}

/* 로딩 */
.loading-state{text-align:center;padding:80px;color:var(--mu);font-size:14px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(47,125,255,.2);border-top-color:var(--pink);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}

/* 라이트박스 */
.lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;object-fit:contain}
.lightbox-close{position:fixed;top:16px;right:20px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* 빈 상태 */
.empty-state{text-align:center;padding:80px 20px;color:var(--mu)}
.empty-state-ico{font-size:40px;margin-bottom:14px}

/* 푸터 */
footer{position:relative;z-index:10;background:rgba(8,6,9,.9);border-top:1px solid var(--border);padding:36px 40px;text-align:center}
.footer-biz{font-size:11px;color:rgba(255,255,255,.2);line-height:1.9;margin-bottom:10px}
.footer-biz span{margin:0 6px}
.footer-copy{font-size:11px;color:rgba(255,255,255,.2)}

/* 반응형 */
/* ── 모바일 드로어 ── */
.mob-menu-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);cursor:pointer;color:var(--text);font-size:18px;flex-shrink:0}
.mob-nav-drawer{display:none;position:fixed;top:64px;left:0;right:0;z-index:99;background:rgba(14,12,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;flex-direction:column;gap:4px;animation:slideDown .2s ease}
.mob-nav-drawer.open{display:flex}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mob-nav-link{display:block;padding:12px 16px;border-radius:10px;color:var(--mu2);text-decoration:none;font-size:14px;font-weight:500;transition:all .15s}
.mob-nav-link:hover{background:rgba(47,125,255,.08);color:var(--pink)}
.mob-nav-divider{height:1px;background:var(--border);margin:6px 0}
.mob-nav-actions{display:flex;gap:8px;padding:8px 0 4px}
.mob-nav-actions a{flex:1;text-align:center;padding:12px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none}

@media(max-width:900px){
  .news-grid{grid-template-columns:1fr 1fr}
  .featured-inner{grid-template-columns:1fr;gap:24px}
  .featured-thumb{order:-1;aspect-ratio:16/7}
}
@media(max-width:640px){
  nav{padding:0 16px}
  .nav-links,.nav-discord{display:none}
  .nav-start{padding:7px 14px;font-size:12px}
  .mob-menu-btn{display:flex}
  .featured-inner{padding:0 16px}
  .featured{padding-top:80px;padding-bottom:40px}
  .featured-title{font-size:22px}
  .featured-desc{font-size:13px}
  .filter-bar{padding:20px 16px 12px;gap:10px}
  .filter-tabs{flex-wrap:wrap;gap:6px}
  .filter-tab{padding:6px 14px;font-size:12px}
  .filter-search{width:100%}
  .filter-search input{width:100%}
  .grid-wrap{padding:0 16px 40px}
  .news-grid{grid-template-columns:1fr}
  .pagination{padding:0 16px 48px;gap:10px}
  .detail-back{padding:20px 16px 0}
  .detail-thumb{padding:16px 16px 0}
  .detail-body{padding:20px 16px 60px}
  .detail-title{font-size:22px}
  .detail-content h2{font-size:17px}
  footer{padding:24px 16px}
}

/* ── 패치노트 모달 ── */
.patch-modal-ov{
  position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.patch-modal-ov.open{opacity:1;pointer-events:all}
.patch-modal-box{
  position:relative;
  background:rgba(28,22,35,.97);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  width:90%;max-width:600px;max-height:85vh;
  overflow:hidden;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.pm-close-btn{
  position:absolute;top:16px;right:16px;z-index:10;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.4);border:none;
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.pm-close-btn:hover{background:rgba(255,255,255,.15)}
.pm-body{padding:24px 28px 28px}
.pm-meta-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pm-tag{font-size:11px;padding:4px 10px;border-radius:100px;font-weight:600}
.pm-date-txt{font-size:12px;color:var(--mu)}
.pm-title-txt{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.pm-ver-txt{font-size:13px;color:var(--mu);margin-bottom:20px}
.pm-md{color:var(--mu2);font-size:14px;line-height:1.7}
.pm-md h2,.pm-md h3{color:#fff;margin:20px 0 10px;font-size:16px}
.pm-md p{margin:8px 0}
.pm-md ul,.pm-md ol{padding-left:20px;margin:8px 0}
.pm-md img{max-width:100%;border-radius:10px;margin:12px 0}
.pm-footer-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08)}

/* ── 페이지 전환 ── */
#pageTransition{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  opacity:0;pointer-events:none;
  transition:opacity .45s cubic-bezier(.4,0,.2,1);
}
#pageTransition.out{opacity:1;pointer-events:all}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(47,125,255,.3);border-radius:3px}

.detail-content code,.pm-md code{background:rgba(255,255,255,.09);border:1px solid var(--border);padding:2px 6px;border-radius:6px;color:#aeeaff}
.detail-content pre,.pm-md pre{background:rgba(0,0,0,.32);border:1px solid var(--border);border-radius:12px;padding:14px;overflow:auto;margin:14px 0}
.detail-content pre code,.pm-md pre code{background:none;border:0;padding:0}
.detail-content del,.pm-md del{opacity:.65}
.detail-content .callout-success,.pm-md .callout-success,.detail-content .callout-tip,.pm-md .callout-tip{background:rgba(74,222,128,.08);border-color:#4ade80}
.detail-content .callout-warning,.pm-md .callout-warning{background:rgba(251,146,60,.08);border-color:#fb923c}
.detail-content .callout-danger,.pm-md .callout-danger{background:rgba(248,113,113,.08);border-color:#f87171}
.detail-content .callout-info,.pm-md .callout-info{background:rgba(56,189,248,.08);border-color:#38bdf8}


/* Turn City patchnote modal fix */
.patchModalFix{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.72);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;padding:20px}
.patchModalFix.open{display:flex}
.patchModalFixBox{width:min(900px,calc(100vw - 32px));max-height:86vh;overflow:auto;background:rgba(9,20,36,.97);border:1px solid rgba(80,170,255,.35);border-radius:26px;box-shadow:0 30px 90px rgba(0,0,0,.58)}
.patchModalFixHead{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:22px 24px;border-bottom:1px solid rgba(255,255,255,.1)}
.patchModalFixHead b{font-size:20px;color:#fff}
.patchModalFixClose{width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.06);color:#fff;font-size:18px;cursor:pointer}
.patchModalFixBody{padding:24px}

<script>
const PATCH_TTL=60000;
const PATCH_KEY='turncity_patches_cache_v1';
const TM={new:{cls:'t-new',label:'신규'},fix:{cls:'t-fix',label:'버그수정'},change:{cls:'t-change',label:'변경'},remove:{cls:'t-change',label:'삭제'}};
const PER_PAGE=9;
let allPatches=[],filtered=[],curSearch='',curPage=1,iconUrl='',defaultThumbUrl='';
function esc(t){return String(t||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function getTagInfo(tags){if(!tags||!tags.length)return{cls:'t-patch',label:'패치노트'};return TM[tags[0]]||{cls:'t-patch',label:'패치노트'};}
function getDate(p){if(p.createdAt?.seconds)return new Date(p.createdAt.seconds*1000).toLocaleDateString('ko-KR');if(p.createdAt)return new Date(p.createdAt).toLocaleDateString('ko-KR');return p.date||'';}
function getDesc(p){const t=(p.blocks||[]).find(b=>b.type==='text');return(t?.text||'').replace(/[#*_>`\[\]]/g,'').substring(0,90);}
function getThumbHtml(p){const img=(p.blocks||[]).find(b=>b.type==='image');const url=img?.url||defaultThumbUrl||iconUrl;return url?`<img src="${esc(url)}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:`<div class="nc-thumb-ph">🏙️</div>`;}
function sortPatches(a,b){return (Number(b.createdAt?.seconds||0)-Number(a.createdAt?.seconds||0)) || String(b.date||b.ver||'').localeCompare(String(a.date||a.ver||''));}
function applyFilter(){filtered=allPatches.filter(p=>!curSearch||(p.ver||'').toLowerCase().includes(curSearch)||(p.title||'').toLowerCase().includes(curSearch)||(p.blocks||[]).some(b=>(b.text||'').toLowerCase().includes(curSearch)));}
function renderFeatured(){if(!allPatches.length)return;const p=allPatches[0],ti=getTagInfo(p.tags),ft=document.getElementById('featuredTag');ft.textContent=ti.label;ft.className='featured-tag nc-tag '+ti.cls;document.getElementById('featuredDate').textContent=getDate(p);document.getElementById('featuredTitle').textContent=p.title||p.ver||'Turn City 소식';document.getElementById('featuredDesc').textContent=getDesc(p)||'Turn City의 최신 소식을 확인하세요.';document.getElementById('featuredThumb').innerHTML=getThumbHtml(p);}
function renderGrid(){applyFilter();const total=Math.ceil(filtered.length/PER_PAGE)||1;if(curPage>total)curPage=total;const items=filtered.slice((curPage-1)*PER_PAGE,curPage*PER_PAGE);const grid=document.getElementById('newsGrid');if(!items.length){grid.innerHTML='<div style="grid-column:1/-1" class="empty-state"><div class="empty-state-ico">📋</div><div>소식이 없습니다.</div></div>';}else grid.innerHTML=items.map(p=>{const ti=getTagInfo(p.tags);const idx=allPatches.indexOf(p);return`<div class="news-card" onclick="openDetail(${idx})"><div class="nc-thumb">${getThumbHtml(p)}</div><div class="nc-body"><div class="nc-meta"><span class="nc-tag ${ti.cls}">${ti.label}</span><span class="nc-date">${getDate(p)}</span></div><div class="nc-title">${esc(p.title||p.ver||'패치노트')}</div><div class="nc-desc">${esc(getDesc(p))}</div></div></div>`}).join('');document.getElementById('pageInfo').textContent=`${curPage} / ${total}`;document.getElementById('prevBtn').disabled=curPage<=1;document.getElementById('nextBtn').disabled=curPage>=total;}
window.setSearch=v=>{curSearch=v.toLowerCase().trim();curPage=1;renderGrid();};
window.setFilter=(f,el)=>{document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');curPage=1;renderGrid();};
window.changePage=d=>{curPage+=d;renderGrid();window.scrollTo({top:280,behavior:'smooth'});};
window.openDetail=idx=>{const p=allPatches[idx];if(!p)return;const ti=getTagInfo(p.tags);const tag=document.getElementById('pmTag');tag.textContent=ti.label;tag.className='pm-tag nc-tag '+ti.cls;document.getElementById('pmDate').textContent=getDate(p);document.getElementById('pmTitle').textContent=p.title||p.ver||'패치노트';document.getElementById('pmVer').textContent=p.ver||'';const img=(p.blocks||[]).find(b=>b.type==='image')?.url||defaultThumbUrl;document.getElementById('pmThumbWrap').innerHTML=img?`<img src="${esc(img)}" style="width:100%;border-radius:16px;object-fit:cover;max-height:400px;border:1px solid rgba(255,255,255,.08)">`:'';const html=(p.blocks||[]).map(b=>{if(b.type==='text')return`<div>${typeof marked!=='undefined'?marked.parse(preprocessMarkdown(b.text||'')):'<p>'+esc(b.text||'')+'</p>'}</div>`;if(b.type==='image')return`<p><img src="${esc(b.url||'')}" onclick="openLightbox('${esc(b.url||'')}')"></p>`;if(b.type==='callout')return`<blockquote>${typeof marked!=='undefined'?marked.parse(preprocessMarkdown(b.text||'')):esc(b.text||'')}</blockquote>`;return'';}).join('')||'<p style="color:var(--mu)">내용이 없습니다.</p>';document.getElementById('pmContent').innerHTML=html;document.getElementById('pmPrevBtn').innerHTML=idx+1<allPatches.length?`<button style="padding:10px 22px;font-size:13px;border:none;cursor:pointer;background:rgba(255,255,255,.08);border-radius:100px;color:var(--mu2);font-family:inherit;font-weight:600" onclick="openDetail(${idx+1})">← 이전 소식</button>`:'';document.getElementById('patchModalOv').classList.add('open');document.body.style.overflow='hidden';};
window.closeDetail=()=>{document.getElementById('patchModalOv').classList.remove('open');document.body.style.overflow='';};
window.openLightbox=src=>{document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';};
window.closeLightbox=()=>{document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';};
function startSlideshow(urls,interval=6){const c=document.getElementById('bgSlides');if(!c||!urls?.length)return;c.innerHTML=urls.map((u,i)=>`<img class="bg-slide ${i===0?'active':''}" src="${esc(u)}" alt="배경">`).join('');if(urls.length>1){let cur=0;setInterval(()=>{const s=c.querySelectorAll('.bg-slide');s[cur].classList.remove('active');cur=(cur+1)%s.length;s[cur].classList.add('active');},interval*1000);}}
async function loadAssets(){try{const r=await fetch('/api/assets',{cache:'no-store'});const a=await r.json();iconUrl=a.iconUrl||'';defaultThumbUrl=a.defaultThumbUrl||a.bgSlides?.[0]||'';if(iconUrl){const n=document.getElementById('navIcon');if(n){n.src=iconUrl;n.style.display='';}}if(a.bgVideoUrl){const v=document.getElementById('bgVideo');v.src=a.bgVideoUrl;v.style.display='block';v.oncanplay=()=>v.classList.add('loaded');}else if(a.bgSlides?.length)startSlideshow(a.bgSlides,a.bgInterval||6);}catch(e){console.warn(e)}}
async function loadPatches(){try{const c=JSON.parse(localStorage.getItem(PATCH_KEY)||'null');if(c&&Date.now()-c.ts<PATCH_TTL){allPatches=c.data.sort(sortPatches);renderFeatured();renderGrid();}}catch{}try{const r=await fetch('/api/patches',{cache:'no-store'});const data=await r.json();allPatches=(data.patches||[]).sort(sortPatches);localStorage.setItem(PATCH_KEY,JSON.stringify({ts:Date.now(),data:allPatches}));renderFeatured();renderGrid();}catch(e){if(!allPatches.length)document.getElementById('newsGrid').innerHTML='<div style="grid-column:1/-1" class="loading-state">소식을 불러오지 못했습니다.</div>';}}
function toggleMobMenu(){const d=document.getElementById('mobNavDrawer');if(d)d.classList.toggle('open');}
loadAssets().then(loadPatches);
</script>


<script>
(function(){
  // 페이지 진입 페이드인
  window.addEventListener('DOMContentLoaded',()=>{
    const ov=document.getElementById('pageTransition');
    if(!ov)return;
    ov.style.opacity='1';
    ov.style.pointerEvents='all';
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        ov.style.opacity='0';
        setTimeout(()=>{ov.style.pointerEvents='none';},460);
      });
    });
  });

  // goPage 전역 함수 (수동 호출용)
  window.goPage=(e,href)=>{
    if(e)e.preventDefault();
    const ov=document.getElementById('pageTransition');
    if(!ov){window.location.href=href;return;}
    ov.style.pointerEvents='all';
    ov.style.opacity='1';
    setTimeout(()=>window.location.href=href,460);
  };

  // 모든 내부 링크 자동 전환
  function attachTransitions(){
    document.querySelectorAll('a[href]').forEach(a=>{
      const href=a.getAttribute('href');
      if(!href||href.startsWith('#')||href.startsWith('http')||href.startsWith('fivem:')||href.startsWith('discord:')||a.target==="_blank"||a.hasAttribute('data-notrans')) return;
      if(a._transAttached) return;
      a._transAttached=true;
      a.addEventListener('click',e=>{
        e.preventDefault();
        window.goPage(null,href);
      });
    });
  }
  window.addEventListener('DOMContentLoaded',attachTransitions);
})();
</script>

<script>
(function(){
  let PATCHES_FIX = [];
  const CACHE_KEY = "turncity_patchnote_page_fix_v1";

  function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
  function dateOf(p){if(p.createdAt?.seconds)return new Date(p.createdAt.seconds*1000).toLocaleDateString('ko-KR');return p.date||'';}
  function tagOf(tags){const t=(tags||[])[0]||'patch';return ({new:'신규',fix:'버그수정',change:'변경',remove:'삭제',patch:'패치노트'})[t]||'패치노트';}
  function descOf(p){const b=(p.blocks||[]).find(x=>x.type==='text');return (b?.text||'').replace(/[#*_>`\[\]~\-]/g,'').replace(/\s+/g,' ').slice(0,120)||'클릭해서 자세히 보기';}
  function preprocess(md){
    return String(md||'').replace(/:::([a-zA-Z가-힣]+)\n([\s\S]*?):::/g,(m,type,body)=>`<div class="patchModalCallout ${type.toLowerCase()}">${renderMd(body.trim())}</div>`);
  }
  function renderMd(md){
    const raw = String(md||'');
    if(typeof marked !== 'undefined'){
      return marked.parse(raw);
    }
    return '<p>'+esc(raw)+'</p>';
  }
  function renderBlock(b){
    if(!b) return '';
    if(b.type === 'image') return `<img src="${esc(b.url||'')}" alt="">`;
    if(b.type === 'callout') return `<div class="patchModalCallout ${esc(b.callout_type||'info')}">${renderMd(b.text||'')}</div>`;
    const processed = preprocess(b.text || '');
    return `<div>${typeof marked !== 'undefined' ? marked.parse(processed) : processed}</div>`;
  }
  function modalHtml(p){
    return `<div class="patchModalFixMeta"><span class="patchModalFixTag">${tagOf(p.tags)}</span><span>${esc(dateOf(p))}</span></div>
    <div class="patchModalFixContent">${(p.blocks||[]).map(renderBlock).join('') || '<p>내용이 없습니다.</p>'}</div>`;
  }
  window.openPatchModalFix = function(i){
    const p = PATCHES_FIX[i];
    if(!p) return;
    document.getElementById('patchModalFixTitle').textContent = p.title || p.ver || '패치노트';
    document.getElementById('patchModalFixBody').innerHTML = modalHtml(p);
    document.getElementById('patchModalFix').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.closePatchModalFix = function(){
    const m = document.getElementById('patchModalFix');
    if(m) m.classList.remove('open');
    document.body.style.overflow = '';
  };
  function attachCardClicks(){
    const cards = [...document.querySelectorAll('.news-card,.patchnoteCard,.nc-card,.patch-card')];
    cards.forEach((card,i)=>{
      card.style.cursor='pointer';
      card.addEventListener('click', (e)=>{
        if(e.target.closest('a,button')) return;
        window.openPatchModalFix(i);
      }, {capture:true});
    });
  }
  function rerenderCommonCards(){
    // If page has newsGrid generated by older script, just attach click.
    const grid = document.getElementById('newsGrid') || document.getElementById('mainPatchnoteGrid');
    if(!grid) { attachCardClicks(); return; }
    // Only rebuild if empty/loading.
    const isEmpty = !grid.children.length || /불러오는 중|소식이 없습니다|패치노트가 없습니다/.test(grid.textContent);
    if(!isEmpty) { attachCardClicks(); return; }
    grid.innerHTML = PATCHES_FIX.map((p,i)=>{
      const img = (p.blocks||[]).find(b=>b.type==='image')?.url;
      return `<article class="news-card" onclick="openPatchModalFix(${i})">
        <div class="nc-thumb">${img?`<img src="${esc(img)}" alt="" style="width:100%;height:100%;object-fit:cover">`:'<div class="nc-thumb-ph">🏙️</div>'}</div>
        <div class="nc-body">
          <div class="nc-meta"><span class="nc-tag">${tagOf(p.tags)}</span><span class="nc-date">${esc(dateOf(p))}</span></div>
          <div class="nc-title">${esc(p.title||p.ver||'패치노트')}</div>
          <div class="nc-desc">${esc(descOf(p))}</div>
        </div>
      </article>`;
    }).join('');
  }
  async function load(){
    try{
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY)||'null');
      if(cached && Date.now()-cached.ts<30000 && cached.data?.length){
        PATCHES_FIX = cached.data;
        setTimeout(rerenderCommonCards, 300);
      }
    }catch{}
    try{
      const r = await fetch('/api/patches',{cache:'no-store'});
      const d = await r.json();
      PATCHES_FIX = (d.patches||[]).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      localStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(),data:PATCHES_FIX}));
      setTimeout(rerenderCommonCards, 300);
      setTimeout(attachCardClicks, 800);
    }catch(e){console.warn('[patch modal fix]', e);}
  }
  document.addEventListener('keydown',e=>{if(e.key==='Escape')window.closePatchModalFix();});
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', load);
  else load();
})();
</script>

</body>
</html>
